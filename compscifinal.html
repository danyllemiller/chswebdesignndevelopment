  <script>
   const questions = [
            // --- Multiple Choice (70 questions) ---
            // Computer Basics
            { question: "What is the main circuit board inside a computer that connects all components?", options: ["CPU", "Motherboard", "RAM", "GPU"], answer: "Motherboard", clue: "Think of it as the 'mother' that holds all the other components." },
            { question: "What does 'SSD' stand for?", options: ["Solid State Drive", "Super Speed Device", "Secure Storage Disk", "System Software D-ROM"], answer: "Solid State Drive", clue: "Unlike an HDD, it has no moving parts." },
            { question: "Which of these is an example of an output device?", options: ["Mouse", "Keyboard", "Scanner", "Headphones"], answer: "Headphones", clue: "An output device sends information *out* of the computer. Headphones send out sound." },
            { question: "What type of software is an internet browser, like Chrome or Firefox?", options: ["System Software", "Application Software", "Utility Software", "Firmware"], answer: "Application Software", clue: "System software runs the computer (like an OS). Application software is for a specific user task." },
            { question: "What does a file extension like '.PDF' stand for?", options: ["Portable Document Format", "Personal Data File", "Picture Document File", "Programmed Digital File"], answer: "Portable Document Format", clue: "It's designed to be easily 'portable' and viewable on any device." },
            { question: "Which component is known as the 'brain' of the computer?", options: ["RAM", "Hard Drive", "CPU", "Power Supply"], answer: "CPU", clue: "It stands for Central Processing Unit and handles all the calculations." },
            { question: "What is the function of an operating system?", options: ["To run a single, specific application", "To manage computer hardware and software resources", "To create a network connection", "To design websites"], answer: "To manage computer hardware and software resources", clue: "Think of Windows, macOS, or Linux. They 'operate' the whole system." },
            { question: "What is a 'pixel'?", options: ["A type of computer virus", "The smallest unit of a digital image or display", "A unit of processing speed", "A type of memory"], answer: "The smallest unit of a digital image or display", clue: "Your screen is made of millions of these tiny 'picture elements'." },
            { question: "What unit is used to measure the speed of a CPU?", options: ["Gigabytes (GB)", "Megapixels (MP)", "Dots per inch (DPI)", "Gigahertz (GHz)"], answer: "Gigahertz (GHz)", clue: "This measures the number of clock cycles per second. 'Hertz' is a unit of frequency." },
            { question: "What is the purpose of a computer's cache memory?", options: ["To store data for the long term", "To provide fast, temporary storage for the CPU", "To manage the display of graphics", "To connect to the internet"], answer: "To provide fast, temporary storage for the CPU", clue: "It's faster than RAM and holds frequently used data so the CPU doesn't have to wait." },
            // Internet and Networking
            { question: "What does DNS stand for in networking?", options: ["Domain Name System", "Dynamic Network Service", "Digital Naming Standard", "Direct Network Storage"], answer: "Domain Name System", clue: "This system is the 'phonebook' of the internet, turning domain names (like google.com) into IP addresses." },
            { question: "What is the primary purpose of a router?", options: ["To store website data", "To forward data packets between computer networks", "To protect a computer from viruses", "To display web pages"], answer: "To forward data packets between computer networks", clue: "It 'routes' traffic between your local network (LAN) and the wider internet (WAN)." },
            { question: "What protocol is used for sending email?", options: ["FTP", "HTTP", "SMTP", "TCP"], answer: "SMTP", clue: "Stands for Simple Mail Transfer Protocol. HTTP is for web pages, FTP is for files." },
            { question: "What is a 'cookie' in the context of the internet?", options: ["A type of computer hardware", "A small piece of data sent from a website and stored on a user's computer", "A malicious software program", "A type of search engine"], answer: "A small piece of data sent from a website and stored on a user's computer", clue: "Websites use these to 'remember' you, such as your login status or items in a shopping cart." },
            { question: "What does 'VoIP' stand for?", options: ["Voice over Internet Protocol", "Video on Integrated Platform", "Virtual Online Interface Port", "Voice on Internet Program"], answer: "Voice over Internet Protocol", clue: "This technology allows you to make phone calls using the internet instead of a traditional phone line." },
            { question: "What is an ISP?", options: ["Internal System Program", "Internet Service Provider", "Integrated Software Platform", "International Security Protocol"], answer: "Internet Service Provider", clue: "This is the company you pay for internet access (e.g., Comcast, Spectrum, AT&T)." },
            { question: "What is the function of a modem?", options: ["To protect a network from unauthorized access", "To store large amounts of data", "To modulate and demodulate signals for internet access over cable or phone lines", "To host a website"], answer: "To modulate and demodulate signals for internet access over cable or phone lines", clue: "The name 'Modem' comes from 'MOdulator-DEModulator'." },
            { question: "What does 'URL' stand for?", options: ["Uniform Resource Locator", "Universal Reference Link", "Uniform Resource Link", "Universal Resource Locator"], answer: "Uniform Resource Locator", clue: "It's the specific 'address' of a resource (like a webpage) on the internet." },
            { question: "What is 'bandwidth' in networking?", options: ["The physical size of a network cable", "The maximum rate of data transfer across a given path", "The number of computers on a network", "The security level of a network connection"], answer: "The maximum rate of data transfer across a given path", clue: "Think of it like the width of a pipe. A wider pipe (more bandwidth) allows more data (water) to flow at once." },
            { question: "What is 'cloud computing'?", options: ["Storing data on your local hard drive", "A network of personal computers", "The delivery of computing services—including servers, storage, and software—over the Internet", "A type of weather forecasting software"], answer: "The delivery of computing services—including servers, storage, and software—over the Internet", clue: "Services like Google Drive, Netflix, and Spotify are all examples of cloud computing." },
            // Programming
            { question: "In programming, what is a 'variable'?", options: ["A fixed value that never changes", "A named storage location that holds a value", "A set of instructions", "An error in the code"], answer: "A named storage location that holds a value", clue: "Think of it as a labeled box where you can store and change information (like a number or text)." },
            { question: "What is a compiler?", options: ["A person who writes code", "A program that translates high-level programming language into machine code", "A tool for debugging code", "A type of data structure"], answer: "A program that translates high-level programming language into machine code", clue: "It translates the entire program at once, *before* it runs. Computers only understand machine code." },
            { question: "Which of the following is a high-level programming language?", options: ["Assembly Language", "Machine Code", "Python", "Binary"], answer: "Python", clue: "High-level languages are easier for humans to read and write (like Python or JavaScript)." },
            { question: "What is a 'loop' used for in programming?", options: ["To make a decision", "To store a collection of items", "To repeat a block of code multiple times", "To define a new function"], answer: "To repeat a block of code multiple times", clue: "This is useful for tasks like processing every item in a list or counting to ten." },
            { question: "What is the purpose of a 'function' in programming?", options: ["To store a single piece of data", "To perform a specific task and organize code into reusable blocks", "To create a conditional statement", "To stop the program from running"], answer: "To perform a specific task and organize code into reusable blocks", clue: "You can 'call' a function by its name to run its code, avoiding repetition." },
            { question: "What does 'API' stand for?", options: ["Application Programming Interface", "Automated Program Interaction", "Advanced Programming Input", "Application Process Integration"], answer: "Application Programming Interface", clue: "This is a set of rules that allows different software applications to talk to each other." },
            { question: "What is the data type for a whole number in most programming languages?", options: ["String", "Float", "Boolean", "Integer"], answer: "Integer", clue: "A 'string' is text, a 'float' is a decimal number, and a 'boolean' is true/false." },
            { question: "What is 'syntax' in the context of programming?", options: ["The logic of a program", "The set of rules that dictates the structure of a language", "The process of finding and fixing errors", "The output of a program"], answer: "The set of rules that dictates the structure of a language", clue: "Just like grammar in English, syntax rules must be followed or the computer won't understand." },
            { question: "What does an 'if-else' statement do?", options: ["It repeats a block of code", "It allows the program to make decisions based on a condition", "It defines a new variable", "It prints text to the screen"], answer: "It allows the program to make decisions based on a condition", clue: "IF a condition is true, do this. ELSE, do that." },
            { question: "What is an array or list?", options: ["A single value", "A collection of items stored at contiguous memory locations", "A block of code that performs a specific task", "A true or false value"], answer: "A collection of items stored at contiguous memory locations", clue: "It's like a variable, but it can hold many values in an ordered sequence." },
            // Cybersecurity
            { question: "What is a 'Denial of Service' (DoS) attack?", options: ["An attack to steal a user's password", "An attack to make a machine or network resource unavailable to its intended users", "An attack to install spyware on a computer", "An attack to deface a website"], answer: "An attack to make a machine or network resource unavailable to its intended users", clue: "It works by flooding the target with so much traffic that it can't serve legitimate users." },
            { question: "What is the purpose of a firewall?", options: ["To cool down the computer's CPU", "To monitor and control incoming and outgoing network traffic", "To increase the speed of an internet connection", "To store user passwords securely"], answer: "To monitor and control incoming and outgoing network traffic", clue: "It acts as a 'wall' between your trusted internal network and the untrusted internet." },
            { question: "What is two-factor authentication (2FA)?", options: ["A method of logging in with two different usernames", "A security process where users provide two different authentication factors to verify themselves", "A way to make passwords twice as long", "A type of antivirus software"], answer: "A security process where users provide two different authentication factors to verify themselves", clue: "This combines something you know (password) with something you have (phone code) or are (fingerprint)." },
            { question: "What is 'spyware'?", options: ["Software that helps users spy on their own network traffic", "Malware that secretly observes the user's activities on the computer", "A security feature of an operating system", "A tool for encrypting files"], answer: "Malware that secretly observes the user's activities on the computer", clue: "It 'spies' on you to steal information like keystrokes or browsing habits." },
            { question: "What is a 'Trojan Horse' in cybersecurity?", options: ["A type of computer hardware", "A security certificate for a website", "Malware disguised as legitimate software", "A method for backing up data"], answer: "Malware disguised as legitimate software", clue: "Like the Greek myth, it tricks you into letting it in by pretending to be something harmless." },
            { question: "What is the goal of a 'phishing' scam?", options: ["To sell antivirus software", "To trick individuals into revealing sensitive personal information", "To improve a computer's performance", "To provide free software downloads"], answer: "To trick individuals into revealing sensitive personal information", clue: "They 'fish' for your information (like passwords or credit card numbers) with fake emails or websites." },
            { question: "What does encryption do?", options: ["It deletes sensitive data", "It converts data into a code to prevent unauthorized access", "It organizes files on a hard drive", "It speeds up data transfer"], answer: "It converts data into a code to prevent unauthorized access", clue: "It scrambles data so that only someone with the 'key' can read it." },
            { question: "What is a 'botnet'?", options: ["A network of private computers infected with malicious software and controlled as a group", "A secure online forum for technology enthusiasts", "A type of internet browser", "The main network cable for an office building"], answer: "A network of private computers infected with malicious software and controlled as a group", clue: "It's a 'network' of 'robots' (infected computers) used for attacks like DoS." },
            { question: "What is a security vulnerability?", options: ["A feature of a software program", "A weakness in a system that can be exploited by an attacker", "A type of strong password", "A method of data backup"], answer: "A weakness in a system that can be exploited by an attacker", clue: "It's a hole or flaw in the code or configuration that attackers look for." },
            { question: "What is 'adware'?", options: ["Software that manages advertisements for a business", "Software that automatically displays or downloads advertising material", "A tool for creating online ads", "A secure way to shop online"], answer: "Software that automatically displays or downloads advertising material", clue: "It's software that shows you unwanted 'advertisements'." },
            // General Knowledge
            { question: "Which of the following is an example of an input device?", options: ["Projector", "Speakers", "Microphone", "Printer"], answer: "Microphone", clue: "An input device sends data *into* the computer. A microphone sends in sound." },
            { question: "What does the acronym 'GPU' stand for?", options: ["Graphics Processing Unit", "General Purpose Unit", "Gaming Performance Utility", "Global Positioning Unit"], answer: "Graphics Processing Unit", clue: "This specialized processor is designed to handle complex visual and graphical tasks." },
            { question: "In what number system do computers operate?", options: ["Decimal (Base-10)", "Hexadecimal (Base-16)", "Octal (Base-8)", "Binary (Base-2)"], answer: "Binary (Base-2)", clue: "Computers use this system, which only has two digits: 0 and 1 (on and off)." },
            { question: "What is open-source software?", options: ["Software that is very expensive", "Software with source code that is available to the public to use and modify", "Software that has been discontinued", "Software that only works on one type of computer"], answer: "Software with source code that is available to the public to use and modify", clue: "The 'source' code is 'open' for anyone to see, unlike proprietary software like Windows or Photoshop." },
            { question: "What is a 'bit'?", options: ["A group of 8 bytes", "The smallest unit of data in a computer", "A type of computer chip", "A measure of internet speed"], answer: "The smallest unit of data in a computer", clue: "It's a single 0 or 1. 'Byte' is a group of 8 bits." },
            { question: "What is a 'server'?", options: ["A computer or system that provides resources, data, or services to other computers, known as clients", "A personal laptop computer", "A type of software for word processing", "The main screen of a computer"], answer: "A computer or system that provides resources, data, or services to other computers, known as clients", clue: "A web server 'serves' websites to your browser (the client)." },
            { question: "What is a 'LAN'?", options: ["Long Area Network", "Local Area Network", "Logistical Access Node", "Latency Acceleration Network"], answer: "Local Area Network", clue: "This is a network in a small, 'local' area, like your home or a single office building." },
            { question: "What does 'HTML' stand for?", options: ["HyperText Markup Language", "High-Tech Media Language", "Home Tool Management Logic", "Hyper-Transfer Machine Language"], answer: "HyperText Markup Language", clue: "It's the standard 'markup language' used to structure the content of a web page." },
            { question: "What is the purpose of a 'zip' file?", options: ["To encrypt files", "To compress one or more files into a single, smaller file", "To delete files permanently", "To display images"], answer: "To compress one or more files into a single, smaller file", clue: "This makes it easier and faster to send large files over the internet." },
            { question: "What is 'spam'?", options: ["A type of computer memory", "Unsolicited junk email", "A secure method of communication", "A brand of computer hardware"], answer: "Unsolicited junk email", clue: "These are the junk messages you receive in your email inbox." },
            { question: "What is a 'search engine'?", options: ["A device for finding lost files on your computer", "A program that searches for and identifies items in a database that correspond to keywords", "A type of social media platform", "A physical machine for exploring the internet"], answer: "A program that searches for and identifies items in a database that correspond to keywords", clue: "Google, Bing, and DuckDuckGo are all examples of this." },
            { question: "What is an 'algorithm'?", options: ["A type of computer monitor", "A set of step-by-step instructions for solving a problem", "A brand of CPU", "A security protocol"], answer: "A set of step-by-step instructions for solving a problem", clue: "Think of it as a 'recipe' for a computer to follow to get a specific result." },
            { question: "What is 'debugging'?", options: ["The process of writing new code", "The process of identifying and removing errors from computer hardware or software", "The act of installing software updates", "The process of designing a user interface"], answer: "The process of identifying and removing errors from computer hardware or software", clue: "You are literally finding and removing 'bugs' (errors) from the code." },
            { question: "What is a 'Boolean' value?", options: ["A number with a decimal point", "A value that can only be true or false", "A piece of text", "A whole number"], answer: "A value that can only be true or false", clue: "Named after George Boole, this logic is fundamental to computing (e.g., 1 or 0, on or off)." },
            { question: "Which of the following is a text editor commonly used by programmers?", options: ["Microsoft Excel", "Adobe Photoshop", "Visual Studio Code", "Windows Media Player"], answer: "Visual Studio Code", clue: "Programmers use text editors to write code. Excel (spreadsheets) and Photoshop (images) are for different tasks." },
            { question: "What is 'pseudocode'?", options: ["Code that is written in a secret language", "A simplified, human-readable description of an algorithm", "An error in a program", "The final, compiled version of a program"], answer: "A simplified, human-readable description of an algorithm", clue: "It's 'fake' (pseudo) code used for planning out logic before writing the real code." },
            { question: "What is a 'data type'?", options: ["The speed of a computer's processor", "A classification that specifies which type of value a variable has", "The physical size of a file", "The color scheme of a website"], answer: "A classification that specifies which type of value a variable has", clue: "This tells the computer if a variable is an integer, string, boolean, etc." },
            { question: "What is the purpose of a 'comment' in code?", options: ["To make the program run faster", "To provide explanations or annotations in the source code for human readers", "To execute a specific command", "To hide parts of the code from the compiler"], answer: "To provide explanations or annotations in the source code for human readers", clue: "The computer ignores comments; they are notes left by the programmer for humans." },
            { question: "What is 'version control' software, like Git, used for?", options: ["To track and manage changes to source code", "To scan for viruses", "To edit images", "To create spreadsheets"], answer: "To track and manage changes to source code", clue: "It's like a 'save' button on steroids, allowing teams to collaborate and track every change." },
            { question: "What is a 'ransomware' attack?", options: ["An attack that steals a user's identity", "An attack that encrypts a victim's files and demands payment for the decryption key", "An attack that slows down a website", "An attack that sends spam emails"], answer: "An attack that encrypts a victim's files and demands payment for the decryption key", clue: "The attackers hold your files for 'ransom' and demand a 'payment'." },
            { question: "What is a 'VPN'?", options: ["Virtual Private Network", "Very Powerful Network", "Virus Protection Node", "Visual Processing Nucleus"], answer: "Virtual Private Network", clue: "It creates a secure, encrypted tunnel for your internet traffic, protecting your privacy." },
            { question: "What is 'social engineering' in the context of cybersecurity?", options: ["The study of how people use social media", "The psychological manipulation of people into performing actions or divulging confidential information", "The design of user-friendly software", "A type of networking event for tech professionals"], answer: "The psychological manipulation of people into performing actions or divulging confidential information", clue: "This is the 'human' side of hacking, tricking people rather than computers (like in a phishing scam)." },
            { question: "Which of the following is a characteristic of a strong password?", options: ["Short and easy to remember", "Uses a common word", "Contains a mix of uppercase letters, lowercase letters, numbers, and symbols", "Is the same for all your accounts"], answer: "Contains a mix of uppercase letters, lowercase letters, numbers, and symbols", clue: "Complexity (mix of characters) and length are key to making a password hard to guess." },
            { question: "What does it mean if a website's URL begins with 'https://'?", options: ["The website is not secure", "The website has a lot of images", "The website has a secure, encrypted connection", "The website is currently under construction"], answer: "The website has a secure, encrypted connection", clue: "The 'S' stands for 'Secure'. This means your connection to the site is encrypted." },
            { question: "What should you do if you suspect you've received a phishing email?", options: ["Reply with your personal information to see if it's real", "Click on all the links in the email", "Forward it to all your contacts", "Delete it without clicking any links or opening attachments"], answer: "Delete it without clicking any links or opening attachments", clue: "Interacting with the email in any way can be dangerous. The safest option is to not engage." },
            { question: "What is 'malware'?", options: ["A type of computer hardware", "Any software intentionally designed to cause damage to a computer, server, client, or computer network", "A secure file storage system", "A program for editing photos"], answer: "Any software intentionally designed to cause damage to a computer, server, client, or computer network", clue: "The name is a combination of 'malicious' and 'software'." },
            { question: "Why is it important to keep your software updated?", options: ["To get new color themes", "Updates often include security patches that protect against vulnerabilities", "To make your computer run slower", "To increase the number of ads you see"], answer: "Updates often include security patches that protect against vulnerabilities", clue: "Developers are constantly fixing security holes (vulnerabilities) they find." },
            { question: "What is a digital signature?", options: ["A picture of your handwritten signature", "A mathematical scheme for verifying the authenticity of digital messages or documents", "Your username for a website", "A type of password"], answer: "A mathematical scheme for verifying the authenticity of digital messages or documents", clue: "It proves that a message came from a specific sender and hasn't been tampered with." },
            { question: "What is the 'Internet of Things' (IoT)?", options: ["A new type of social media platform", "The network of physical objects embedded with sensors and software for the purpose of connecting and exchanging data", "An online encyclopedia", "A secure email service"], answer: "The network of physical objects embedded with sensors and software for the purpose of connecting and exchanging data", clue: "This includes 'smart' devices like smartwatches, smart thermostats, and smart refrigerators." },
            { question: "What does 'HTTP' stand for?", options: ["HyperText Transfer Protocol", "High-Tech Transfer Process", "HyperText-based Text Processing", "Hyper-Transfer Terminal Protocol"], answer: "HyperText Transfer Protocol", clue: "This is the foundational protocol for data communication on the World Wide Web." },
            
            // --- True / False (30 questions) ---
            { question: "The CPU is often referred to as the brain of the computer.", options: ["True", "False"], answer: "True", clue: "The Central Processing Unit (CPU) performs all the calculations and instructions." },
            { question: "RAM is a type of volatile memory, meaning its contents are lost when the computer powers off.", options: ["True", "False"], answer: "True", clue: "RAM is temporary storage. Your hard drive or SSD is non-volatile (permanent) storage." },
            { question: "A mouse is an example of an output device.", options: ["True", "False"], answer: "False", clue: "A mouse is an *input* device because you send data (clicks, movement) *into* the computer." },
            { question: "An operating system is not necessary for a computer to function.", options: ["True", "False"], answer: "False", clue: "The OS (like Windows or macOS) is essential for managing all hardware and software." },
            { question: "A terabyte is larger than a gigabyte.", options: ["True", "False"], answer: "True", clue: "The order is Kilobyte, Megabyte, Gigabyte, Terabyte. There are about 1000 gigabytes in a terabyte." },
            { question: "Wi-Fi is a technology that allows devices to connect to a network wirelessly.", options: ["True", "False"], answer: "True", clue: "Wi-Fi uses radio waves to create a wireless local area network (WLAN)." },
            { question: "Every website on the internet has a unique IP address.", options: ["True", "False"], answer: "True", clue: "An IP address is like the website's street address. DNS translates the name (google.com) to this address." },
            { question: "HTML is a programming language used to create dynamic, interactive web applications.", options: ["True", "False"], answer: "False", clue: "HTML is a *markup* language used for structure. JavaScript is a *programming* language used for interactivity." },
            { question: "'Spam' refers to important, high-priority emails.", options: ["True", "False"], answer: "False", clue: "Spam is unsolicited junk email." },
            { question: "Cloud storage means you are saving your files on a server on the internet.", options: ["True", "False"], answer: "True", clue: "You are saving data on someone else's computer (a server) 'in the cloud' (the internet)." },
            { question: "In programming, a syntax error will prevent the program from running.", options: ["True", "False"], answer: "True", clue: "A syntax error is like a grammar mistake that the computer cannot understand." },
            { question: "A 'float' is a data type used to store text.", options: ["True", "False"], answer: "False", clue: "A 'float' (or floating-point number) is used for numbers with decimals. A 'string' is used for text." },
            { question: "A 'for' loop is designed to repeat a task indefinitely.", options: ["True", "False"], answer: "False", clue: "A 'for' loop typically repeats a set number of times. A 'while(true)' loop would repeat indefinitely." },
            { question: "All programming languages use the same syntax.", options: ["True", "False"], answer: "False", clue: "Each language has its own unique syntax (grammar rules), just like human languages." },
            { question: "The main purpose of debugging is to add new features to a program.", options: ["True", "False"], answer: "False", clue: "The purpose of debugging is to find and fix errors ('bugs')." },
            { question: "A strong password should be short and easy to guess.", options: ["True", "False"], answer: "False", clue: "A strong password should be long, complex (using symbols, numbers, etc.), and hard to guess." },
            { question: "Encryption makes data unreadable to unauthorized users.", options: ["True", "False"], answer: "True", clue: "It scrambles data into a secret code that can only be read with the correct key." },
            { question: "A firewall is a type of malware.", options: ["True", "False"], answer: "False", clue: "A firewall is a security device (software or hardware) that *protects against* malware." },
            { question: "Two-factor authentication adds an extra layer of security to your accounts.", options: ["True", "False"], answer: "True", clue: "It requires a second 'factor' (like a phone code) in addition to your password." },
            { question: "It is safe to click on links and download attachments from unknown email senders.", options: ["True", "False"], answer: "False", clue: "This is a very common way to spread malware and conduct phishing attacks." },
            { question: "A solid-state drive (SSD) has no moving parts.", options: ["True", "False"], answer: "True", clue: "SSDs use flash memory (like a USB drive), while older HDDs use spinning disks and read/write heads." },
            { question: "A bit is larger than a byte.", options: ["True", "False"], answer: "False", clue: "A bit is the smallest unit (a 0 or 1). A byte is a group of 8 bits." },
            { question: "Machine code is easily understood by humans.", options: ["True", "False"], answer: "False", clue: "Machine code is a sequence of 0s and 1s that is directly understood by the CPU, but is very difficult for humans to read." },
            { question: "The 'CC' field in an email stands for 'Carbon Copy'.", options: ["True", "False"], answer: "True", clue: "This term comes from the days of using carbon paper to make copies of typed documents." },
            { question: "An algorithm must always produce the correct result.", options: ["True", "False"], answer: "True", clue: "A key part of an algorithm's definition is that it is a set of steps to solve a *specific* problem, which implies a correct outcome." },
            { question: "Deleting a file from your computer's recycle bin makes it permanently unrecoverable.", options: ["True", "False"], answer: "False", clue: "When you empty the recycle bin, the data isn't immediately erased; the space is just marked as 'available'. Specialized software can often recover it." },
            { question: "Open-source software is always free of charge.", options: ["True", "False"], answer: "False", clue: "'Open source' means the source code is public, but companies can still charge for packaged versions or support (e.g., Red Hat Linux)." },
            { question: "A computer virus is a type of hardware.", options: ["True", "False"], answer: "False", clue: "A virus is a type of malicious *software* (malware)." },
            { question: "Phishing is a legitimate way for companies to request your personal information.", options: ["True", "False"], answer: "False", clue: "Phishing is a scam. Legitimate companies will almost never ask for your password or other sensitive info via email." },
            { question: "It is a good security practice to use the same password for multiple websites.", options: ["True", "False"], answer: "False", clue: "This is a very *bad* practice. If one site is breached, attackers can access all your accounts." }
        ];

        // --- DOM Elements ---
        const questionEl = document.getElementById('question');
        const optionsContainer = document.getElementById('options');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const questionCounterEl = document.getElementById('question-counter');
        const quizContainer = document.getElementById('quiz-container');
        const resultContainer = document.getElementById('result-container');
        const scoreEl = document.getElementById('score');
        const scoreTextEl = document.getElementById('score-text');
        const restartBtn = document.getElementById('restart-btn');
        const reportContainerEl = document.getElementById('detailed-report'); 

        let currentQuestionIndex = 0;
        let userAnswers = new Array(questions.length).fill(null);

        // --- Shuffle Logic ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]]; 
            }
        }

        function prepareQuiz() {
            questions.forEach(question => {
                const isTrueFalse = question.options.includes("True") && question.options.includes("False");
                if (!isTrueFalse) {
                    shuffleArray(question.options);
                }
            });
            shuffleArray(questions);
        }

        function loadQuestion() {
            const currentQuestion = questions[currentQuestionIndex];
            questionEl.textContent = currentQuestion.question;
            questionCounterEl.textContent = `Question ${currentQuestionIndex + 1} of ${questions.length}`;
            optionsContainer.innerHTML = '';

            // --- GRID LOGIC ---
            // Reset main container classes
            optionsContainer.className = ''; 
            
            // If more than 2 options (Multiple Choice), make it a row (grid system)
            if (currentQuestion.options.length > 2) {
                optionsContainer.classList.add('row', 'g-3'); 
            } else {
                // If 2 options (True/False), make it a stack
                optionsContainer.classList.add('d-flex', 'flex-column', 'gap-3');
            }

            currentQuestion.options.forEach(option => {
                // Create a Wrapper for Grid Layout
                const wrapper = document.createElement('div');
                
                if (currentQuestion.options.length > 2) {
                    // 2 columns on tablet/desktop, 1 column on phone
                    wrapper.className = 'col-12 col-md-6'; 
                } else {
                    // Full width for stack
                    wrapper.className = 'w-100'; 
                }

                // Create the Card
                const optionDiv = document.createElement('div');
                // Added d-flex align-items-center to force side-by-side alignment
                optionDiv.classList.add('quiz-option', 'card', 'p-3', 'cursor-pointer', 'h-100', 'd-flex', 'flex-row', 'align-items-center');
                optionDiv.style.cursor = 'pointer';

                // Radio Button
                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'option';
                radio.value = option;
                radio.id = option;
                radio.classList.add('form-check-input', 'me-3', 'flex-shrink-0');
                radio.style.marginTop = '0'; // Prevent default top margin from messing up alignment
                
                // Label
                const label = document.createElement('label');
                label.htmlFor = option;
                label.textContent = option;
                label.style.cursor = 'pointer';
                label.classList.add('mb-0', 'w-100'); // Ensure label takes up space and has no bottom margin

                optionDiv.appendChild(radio);
                optionDiv.appendChild(label);
                
                // Add card to wrapper, wrapper to container
                wrapper.appendChild(optionDiv);
                optionsContainer.appendChild(wrapper);

                // Restore previous selection
                if (userAnswers[currentQuestionIndex] === option) {
                    radio.checked = true;
                    optionDiv.classList.add('option-selected');
                }

                // Click event
                optionDiv.addEventListener('click', () => {
                    document.querySelectorAll('input[name="option"]').forEach(r => r.checked = false);
                    radio.checked = true;
                    userAnswers[currentQuestionIndex] = option;
                    
                    // Visual highlighting
                    document.querySelectorAll('.quiz-option').forEach(div => div.classList.remove('option-selected'));
                    optionDiv.classList.add('option-selected');
                });
            });

            updateNavigation();
        }

        function updateNavigation() {
            prevBtn.disabled = currentQuestionIndex === 0;
            if (currentQuestionIndex === questions.length - 1) {
                nextBtn.textContent = 'Submit';
            } else {
                nextBtn.textContent = 'Next';
            }
        }

        function showResults() {
            let score = 0;
            // Build the Report HTML sequentially
            let reportHTML = '<div class="d-grid gap-3">';

            questions.forEach((q, index) => {
                const userAnswer = userAnswers[index];
                const isCorrect = (userAnswer === q.answer);
                
                if (isCorrect) score++;

                // Determine styling based on correctness
                // Green background for correct, Red for incorrect
                const cardClass = isCorrect ? 'border-success' : 'border-danger';
                const headerClass = isCorrect ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger';
                const statusIcon = isCorrect ? '✅' : '❌';

                reportHTML += `
                    <div class="card ${cardClass}">
                        <div class="card-header ${headerClass} fw-bold">
                            ${statusIcon} Question ${index + 1}
                        </div>
                        <div class="card-body">
                            <h5 class="card-title">${q.question}</h5>
                            <p class="card-text mt-3">
                                <strong>Your Answer:</strong> ${userAnswer || "<em>No Answer Selected</em>"}
                            </p>
                            ${!isCorrect ? 
                                `<div class="alert alert-warning mt-3 mb-0">
                                    <strong>💡 Hint:</strong> ${q.clue}
                                </div>` 
                                : ''
                            }
                        </div>
                    </div>
                `;
            });

            reportHTML += '</div>';
            
            // --- HIDE QUIZ, SHOW RESULTS ---
            // FIXED: Using Bootstrap's 'd-none' instead of Tailwind's 'hidden'
            quizContainer.classList.add('d-none');
            resultContainer.classList.remove('d-none');

            // --- Set Score ---
            scoreEl.textContent = `${score} / ${questions.length}`;
            
            const percentage = (score / questions.length) * 100;
            let feedback = '';
            if (percentage >= 90) feedback = "Excellent! You have a strong grasp of these concepts.";
            else if (percentage >= 75) feedback = "Great job! You know this material very well.";
            else if (percentage >= 50) feedback = "Good effort. There's some room for improvement.";
            else feedback = "Keep studying! You can improve your score with more review.";
            
            scoreTextEl.textContent = feedback;

            // --- Inject Report ---
            reportContainerEl.innerHTML = reportHTML;
        }

        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResults();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        });
        
        restartBtn.addEventListener('click', () => {
            currentQuestionIndex = 0;
            userAnswers.fill(null);
            
            // Reset and shuffle questions again for a new attempt
            prepareQuiz();

            // Clear the old report
            reportContainerEl.innerHTML = ''; 

            // FIXED: Using Bootstrap's 'd-none'
            resultContainer.classList.add('d-none');
            quizContainer.classList.remove('d-none');
            loadQuestion();
        });

        // Initial load
        prepareQuiz();
        loadQuestion();
  </script>
