    const diagPool = [
        { question: "What is the primary problem that a database solves for a dynamic website?", options: ["It makes the site responsive on mobile.", "It writes CSS code automatically.", "It solves the 'amnesia' problem by providing permanent, organized memory/storage on a server.", "It forces users to pay a subscription fee."] },

        { question: "What is a Foreign Key?", options: ["A column in one table that points back to the Primary Key of another table, creating a link.", "A password from another country.", "A broken database link.", "A key used to encrypt data."] },
        { question: "Which SQL command corresponds to the 'Read' action in CRUD?", options: ["INSERT", "UPDATE", "DELETE", "SELECT"] },
        { question: "Which SQL command is used to add a brand new record to a table?", options: ["ADD NEW", "CREATE ROW", "UPDATE", "INSERT INTO"] },

        { question: "What is an SQL Injection (SQLi) attack?", options: ["A virus that deletes CSS files.", "A hacker typing malicious SQL commands into an input field to trick the server.", "A slow internet connection causing database lag.", "An employee stealing a server hard drive."] },
        { question: "How do professional developers prevent SQL Injection attacks?", options: ["By removing all search bars.", "By turning off the server at night.", "By using a NoSQL database.", "By using 'Parameterized Queries' to sanitize inputs."] },
        { question: "What is 'Password Hashing'?", options: ["A two-way encryption that the admin can decrypt.", "A way to automatically generate passwords for users.", "A tool for compressing databases.", "A one-way mathematical meat-grinder that turns a password into an irreversible fingerprint."] },
        { question: "What does adding a 'Salt' to a password hash do?", options: ["Makes the database run faster.", "Removes vowels from the password.", "Deletes old passwords.", "Adds random characters before hashing to ensure identical passwords have different hashes."] },
        { question: "In SQL, what does the JOIN command do?", options: ["Connects two separate database servers together.", "Merges two rows into one.", "Joins a user to a mailing list.", "Combines columns from two or more tables based on a related column."] },
        { question: "If you execute DELETE FROM Users; without a WHERE clause, what happens?", options: ["Nothing happens.", "The first user is deleted.", "The table itself is deleted.", "Every single user in the table is deleted."] },
        { question: "What is a 'Database Schema'?", options: ["A visual color theme for the dashboard.", "A type of SQL injection attack.", "The password for the database admin.", "The structural blueprint that defines the tables, columns, and relationships."] },
        { question: "What does the LIMIT 10 clause do at the end of a SQL query?", options: ["Deletes 10 rows.", "Waits 10 seconds before executing.", "Multiplies all numbers by 10.", "Restricts the output to only return the first 10 rows."] },
        { question: "In Local Storage, data is always saved as what data type?", options: ["An Array", "An Integer", "A Boolean", "A String (Text)"] },
        { question: "How do you store a complex JavaScript Object into Local Storage?", options: ["You can't; it must be an Array.", "You just save it directly.", "You encrypt it first.", "You must use JSON.stringify() to turn it into a string."] },
        { question: "What does the SQL command ORDER BY score_value DESC do?", options: ["Orders the results alphabetically.", "Orders the results from lowest score to highest.", "Deletes all scores.", "Orders the results from highest score to lowest."] },
        { question: "What is 'Data Validation'?", options: ["Deleting old data.", "Hashing passwords.", "Backing up the database.", "Ensuring that data entered into a system meets specific criteria before saving."] },
