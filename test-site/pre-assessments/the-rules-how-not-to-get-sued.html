        { question: "What does the symbol '™' represent?", options: ["Copyright", "Trademark (Brand identity)", "Patent", "CC License"] },
        { question: "Which type of intellectual property is NOT automatic and must be applied for and granted by the government?", options: ["Copyright", "Trademark", "Patent", "Trade Secret"] },
        { question: "What is 'Work Made for Hire'?", options: ["Volunteering.", "A contract where your employer owns the copyright to everything you build.", "Working for free.", "Selling code."] },
        { question: "Which Creative Commons license requirement means 'You must give credit to the original creator'?", options: ["NC", "ND", "Attribution (BY)", "SA"] },
        { question: "If a license is marked 'NC', can you use that asset on a website that sells products?", options: ["Yes", "No, NC means NonCommercial use only.", "Only in the footer", "Only if cropped"] },
        { question: "What does the 'ND' requirement in a CC license prohibit?", options: ["Money", "Credit", "Editing, cropping, or filtering the work (No Derivatives).", "Mobile use"] },
        { question: "Work that has no copyright protection and is free for anyone to use without permission belongs to the:", options: ["Deep Web", "Creative Commons", "Public Domain", "Private Sector"] },
        { question: "What is the 'Digital Footprint'?", options: ["Monitor size", "A permanent record of every activity, search, and comment a user makes online.", "Footer width", "Secure login"] },
        { question: "What does PII stand for in the context of user privacy?", options: ["Public Internet", "Personally Identifiable Information", "Private Input", "Password Index"] },
        { question: "What is an 'Invasion of Privacy' in web development?", options: ["Theft", "Collecting or sharing a user's personal data without their consent.", "Broken tab", "Black theme"] },
        { question: "HTTP is like sending a ____________, while HTTPS is like sending a sealed armored letter.", options: ["Postcard", "Package", "Email", "Note"] },
        { question: "What technology provides the 's' in HTTPS and the padlock icon in the browser?", options: ["JavaScript", "CSS", "SSL/TLS Certificate", "VPN"] },
        { question: "How many steps are typically involved in the SSL/TLS Handshake?", options: ["3", "5", "8", "10"] },
        { question: "What is a 'Certificate Authority' (CA)?", options: ["Police", "A trusted third party that verifies a website is who they say they are.", "Developer", "Router"] },

        { question: "The Nevada privacy law SB220 uses which model for the sale of consumer data?", options: ["Opt-In", "Opt-Out", "No Sale", "Implicit"] },
        { question: "What does 'Privacy by Design' mean?", options: ["Pretty policy", "Building data protection into the technology from the very start of development.", "Original images", "Hidden code"] },

        { question: "In the 'POUR' principles, what does the 'P' stand for?", options: ["Powerful", "Private", "Perceivable", "Public"] },
        { question: "Which principle ensures that a user can navigate your entire site using only a keyboard?", options: ["Operable", "Understandable", "Robust", "Perceivable"] },
