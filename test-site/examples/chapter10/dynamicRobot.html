<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Robot Interface</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; /* Darker background for "active" feel */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            transition: background-color 0.5s;
        }

        .robot-interface {
            background: white;
            width: 300px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.3);
            text-align: center;
            border: 1px solid #3498db;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .robot-display {
            background-color: #bdc3c7;
            height: 150px;
            width: 150px;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            transition: all 0.3s ease;
            border: 4px solid transparent;
        }

        /* Dynamic Classes for JS to toggle */
        .robot-display.active {
            background-color: #e0ffe0;
            border-color: #2ecc71;
            box-shadow: 0 0 20px #2ecc71;
            transform: scale(1.1);
        }

        p.status {
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-family: monospace;
            font-size: 1.1em;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: scale(0.95);
        }
    </style>
<link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>
</head>
<body>

    <div class="robot-interface">
        <h1 id="model-name">Model X-100</h1>
        
        <div id="robot-face" class="robot-display">
            😴
        </div>

        <p id="status-text" class="status">Status: OFFLINE</p>

        <button onclick="togglePower()">Initialize System</button>
    </div>

    <script>
        // State variable to track if robot is on or off
        let isOnline = false;

        function togglePower() {
            const face = document.getElementById('robot-face');
            const status = document.getElementById('status-text');
            const btn = document.querySelector('button');

            if (!isOnline) {
                // Turn ON
                face.innerHTML = "🤖"; // Change emoji
                face.classList.add('active'); // Add styling class
                status.innerText = "Status: ONLINE - READY";
                status.style.color = "#27ae60";
                btn.innerText = "Power Down";
                btn.style.backgroundColor = "#e74c3c";
                
                // Console interaction for the demo phase
                console.log("SYSTEM BOOT SEQUENCE COMPLETE at " + new Date().toLocaleTimeString());
                
                isOnline = true;
            } else {
                // Turn OFF
                face.innerHTML = "😴";
                face.classList.remove('active');
                status.innerText = "Status: OFFLINE";
                status.style.color = "#7f8c8d";
                btn.innerText = "Initialize System";
                btn.style.backgroundColor = "#3498db";
                
                console.log("System shutdown initiated...");
                
                isOnline = false;
            }
        }
    </script>
<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
