<!-- test-site/logout.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Logging Out | CHS Web Design</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  
  <!-- Favicon Icons -->
  <link rel="icon" type="image/x-icon" href="/images/favicon/favicon.ico">

  <!-- BootStrap & Styles -->
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="/css/dacStyleSheets.css?v=1.8" rel="stylesheet" />
  
  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
  
  <!-- Loader for Navigation & Auth Guard -->
  <script src="/js/loader.js?v=6"></script>
  <script type="module" src="/js/auth-guard.js"></script>
</head>
<body class="d-flex flex-column bg-light vh-100">

  <!--Navigation-->
  <div class="container-fluid sticky-top px-0 no-print">
    <div id="nav-placeholder"></div>
  </div>

  <div class="flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="text-center p-5 bg-white rounded shadow-sm border" style="max-width: 400px;">
        <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        <h3 class="fw-bold text-primary gochi">Logging you out...</h3>
        <p class="text-muted small mb-0">Clearing your local session and returning home.</p>
    </div>
  </div>

  <script type="module">
    window.onload = () => {
      // 1. Clear local session storage used by the MariaDB login
      localStorage.removeItem('user');
      localStorage.clear(); 

      // 2. Short delay for visual feedback, then bounce to home
      setTimeout(() => {
        window.location.replace("/index.html");
      }, 1000);
    };
  </script>

  <a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
