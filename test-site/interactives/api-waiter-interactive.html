<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Chapter 17 Interactive: API Waiter Analogy</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Foundation:wght@400..700" rel="stylesheet"/>
  <link href="/css/dacStyleSheets.css" rel="stylesheet"/>
<link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/css/interactive.css" rel="stylesheet"/>
</head>
<body>
  <div class="container-fluid sticky-top px-0 no-print"><div id="nav-placeholder"></div></div>

  <section class="container-fluid my-5">
    <div class="row"><div class="col-12 d-flex flex-column align-items-center">
        
        <nav class="mb-4 w-100 d-flex justify-content-start small fw-bold container">
            <a href="the-future-data.html" class="text-decoration-none da-primary">
                <i class="fas fa-angles-left me-1"></i> Back to Chapter 17 Reading
            </a>
        </nav>

        <div id="interactive-module" class="d-flex justify-content-center w-100 py-4 mb-5">
            <main class="container bg-white rounded-4 shadow-lg overflow-hidden border p-0 interactive-main">
                <div class="row g-0 h-100 module-row">
                    
                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">
                        <div class="position-absolute top-0 start-0 mt-3 ms-4 text-white-50 small text-uppercase fw-bold letter-spacing-wide">
                            <i class="fas fa-concierge-bell me-2"></i> API Call
                        </div>
                        
                        <div class="code-font fs-6 fs-md-5 lh-lg mt-4">
                            <div class="text-secondary mb-2" data-steps="1">// 1. Check Menu (API Documentation)</div>
                            <span class="code-segment step-hidden text-secondary mb-2 d-block" data-steps="2">// 2. Waiter (API) takes the order to Kitchen</span>
                            <span class="code-segment step-hidden text-info" data-steps="2,3">fetch</span><span class="code-segment step-hidden text-white" data-steps="2,3">('</span><span class="code-segment step-hidden text-success" data-steps="2,3">kitchen.com/order</span><span class="code-segment step-hidden text-white" data-steps="2,3">', {</span><br>
                            &nbsp;&nbsp;<span class="code-segment step-hidden text-warning" data-steps="2,3">item</span><span class="code-segment step-hidden text-white" data-steps="2,3">: "Burger"</span><br>
                            <span class="code-segment step-hidden text-white" data-steps="2,3">});</span><br><br>
                            <div class="text-secondary mb-2" data-steps="3">// 3. Waiter brings Data (Food) back!</div>
                        </div>

                        <div class="mt-5 preview-wrapper rounded p-4 position-relative overflow-hidden bg-secondary bg-opacity-25 d-flex justify-content-around align-items-center">
                            <div class="text-center transition-all" id="icon-client"><i class="fas fa-user display-4 text-white mb-2"></i><br><small>Client</small></div>
                            <div class="text-center transition-all opacity-25" id="icon-api"><i class="fas fa-concierge-bell display-4 da-primary mb-2"></i><br><small>API</small></div>
                            <div class="text-center transition-all opacity-25" id="icon-server"><i class="fas fa-server display-4 text-white mb-2"></i><br><small>Server</small></div>
                        </div>
                    </div>

                    <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-between bg-white text-dark">
                        <div>
                            <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success rounded-pill small fw-bold mb-4 text-uppercase letter-spacing-wide">Interactive Lesson</div>
                            <h2 class="display-6 fw-bold da-primary mb-2 mt-0">The Waiter Analogy</h2>
                            <div class="d-flex gap-1 mb-5 mt-4" id="module-progress"></div>
                            <div id="module-content" class="content-min-height"></div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                            <button class="btn-prev btn text-secondary fw-semibold border-0"><i class="fas fa-arrow-left me-2"></i> Back</button>
                            <button class="btn-next btn text-white bg-da-primary fw-semibold shadow-sm px-4 py-2">Next Step <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div></div>
  </section>


  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "The Menu (Documentation)", icon: "fa-book-open", text: "You (the Client) sit at a table. You read the <strong>Menu</strong> to see what you are allowed to order. In software, the menu is the <strong>API Documentation</strong>—the rules for what data you can ask for." },
        { title: "The Waiter (The API)", icon: "fa-concierge-bell", text: "You can't walk into the kitchen (the Server/Database). Instead, you give your order to the <strong>Waiter</strong>. The Waiter is the <strong>API</strong>—the messenger that takes your request securely to the kitchen." },
        { title: "The Delivery (The Response)", icon: "fa-hamburger", text: "The kitchen prepares the food. The Waiter (API) carries the food (Data) back out and sets it on your table!" }
    ];
    
    const quiz = {
        snippet: `<i class="fas fa-utensils da-primary me-2"></i> Customer -> Waiter -> Kitchen`,
        question: "In the restaurant analogy, what does the 'Menu' represent?",
        options: [
            { text: "The Database where all the files are stored", isCorrect: false },
            { text: "The API Documentation (the rules for what can be requested)", isCorrect: true },
            { text: "The web browser the customer is using", isCorrect: false }
        ],
        correctText: "Correct! The menu provides the exact list of options and formats you are allowed to use when making a request to the API.",
        incorrectText: "Think about what a menu actually is: a list of rules/options for what the kitchen is willing to make for you."
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const client = document.getElementById('icon-client');
        const api = document.getElementById('icon-api');
        const server = document.getElementById('icon-server');
        
        if (step === 1) {
            client.className = "text-center transition-all opacity-100";
            api.className = "text-center transition-all opacity-25";
            server.className = "text-center transition-all opacity-25";
        } else if (step === 2) {
            client.className = "text-center transition-all opacity-50";
            api.className = "text-center transition-all opacity-100";
            server.className = "text-center transition-all opacity-50";
        } else if (step === 3) {
            client.className = "text-center transition-all opacity-100";
            api.className = "text-center transition-all opacity-100 da-primary";
            server.className = "text-center transition-all opacity-100";
        }
    });
  </script>
<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
