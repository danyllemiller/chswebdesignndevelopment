<link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>

<body>
  <div class="container-fluid sticky-top px-0 no-print"><div id="nav-placeholder"></div></div>

  <section class="container-fluid my-5">
    <div class="row"><div class="col-12 d-flex flex-column align-items-center">
        
        <nav class="mb-4 w-100 d-flex justify-content-start small fw-bold container">
            <a href="/year1/the-clothes-intro-to-css.html" class="text-decoration-none da-primary">
                <i class="fas fa-angles-left me-1"> Back to Chapter 6 Reading</i>
            </a>
        </nav>

        <div id="interactive-module" class="d-flex justify-content-center w-100 py-4 mb-5">
            <main class="container bg-white rounded-4 shadow-lg overflow-hidden border p-0 interactive-main">
                <div class="row g-0 h-100 module-row">
                    
                    <!-- Code Column -->
                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">
                        <div class="position-absolute top-0 start-0 mt-3 ms-4 text-white-50 small text-uppercase fw-bold letter-spacing-wide">
                            <i class="fas fa-code me-2"></i> CSS Code
                        </div>
                        
                        <div class="code-font fs-5 fs-md-4 lh-lg mt-4">
                            <span class="code-segment step-hidden text-secondary small" data-steps="0,1">/* Triggered via Keyboard Tab */</span><br>
                            <span class="code-segment step-hidden syn-sel" data-steps="0,1">button:focus</span> <span class="code-segment step-hidden syn-punct" data-steps="0,1">{</span><br>
                            &nbsp;&nbsp;<span class="code-segment step-hidden syn-prop" data-steps="1">outline</span><span class="code-segment step-hidden syn-punct" data-steps="1">:</span> <span class="code-segment step-hidden syn-val" data-steps="1">3px solid blue</span><span class="code-segment step-hidden syn-punct" data-steps="1">;</span><br>
                            <span class="code-segment step-hidden syn-punct" data-steps="0,1">}</span>
                        </div>

                        <div class="mt-5 preview-wrapper rounded p-4 position-relative overflow-hidden bg-secondary bg-opacity-25 d-flex justify-content-center align-items-center">
                            <div class="position-absolute top-0 end-0 mt-2 me-2 text-uppercase fw-bold preview-badge px-2 py-1 rounded text-dark">Browser View</div>
                            <div class="w-100 p-4 bg-white rounded shadow-sm border text-center d-flex flex-column justify-content-center align-items-center" style="min-height: 120px;">
                                <button id="preview-btn" class="btn btn-light border px-4 py-2 transition-all shadow-sm">Click or Tab to Me</button>
                                <div id="preview-hint" class="text-secondary small mt-3 opacity-0 transition-all"><i class="fas fa-keyboard me-1"></i> Simulated keyboard focus applied</div>
                            </div>
                        </div>
                    </div>

                    <!-- Content Column -->
                    <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-between bg-white text-dark">
                        <div>
                            <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success rounded-pill small fw-bold mb-4 text-uppercase letter-spacing-wide">Interactive Lesson</div>
                            <h2 class="display-6 fw-bold da-primary mb-2 mt-0">The :focus Pseudo-class</h2>
                            <div class="d-flex gap-1 mb-5 mt-4" id="module-progress"></div>
                            <div id="module-content" class="content-min-height"></div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                            <button class="btn-prev btn text-secondary fw-semibold border-0"><i class="fas fa-arrow-left me-2"></i> Back</button>
                            <button class="btn-next btn text-white bg-da-primary fw-semibold shadow-sm px-4 py-2">Next Step <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div></div>
  </section>


  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "Targeting State", icon: "fa-toggle-on", text: "Pseudo-classes style elements based on their <em>state</em>. While <code>:hover</code> is triggered by a mouse, the <code>:focus</code> pseudo-class is triggered when an element is selected using the keyboard (usually by pressing the <strong>Tab</strong> key)." },
        { title: "Crucial for Accessibility", icon: "fa-universal-access", text: "Providing clear visual feedback for <code>:focus</code> (like a thick blue outline) is absolutely critical for users who navigate the web without a mouse so they know what element is currently selected!" }
    ];
    
    const quiz = {
        snippet: `<code class="da-primary fw-bold">button:focus</code> <code>{ outline: 3px solid blue; }</code>`,
        question: "Which pseudo-class is critical for keyboard accessibility, targeting an element when a user tabs to it?",
        options: [
            { text: ":hover", isCorrect: false },
            { text: ":active", isCorrect: false },
            { text: ":focus", isCorrect: true }
        ],
        correctText: "Spot on! <code>:focus</code> is essential for keyboard navigators.",
        incorrectText: "Remember, we need the pseudo-class specifically associated with tabbing or clicking on an input element."
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const btn = document.getElementById('preview-btn');
        const hint = document.getElementById('preview-hint');
        if (step === 1) {
            btn.style.outline = '3px solid #0d6efd';
            btn.style.outlineOffset = '2px';
            hint.style.opacity = '1';
        } else {
            btn.style.outline = 'none';
            btn.style.outlineOffset = '0px';
            hint.style.opacity = '0';
        }
    });
  </script>
