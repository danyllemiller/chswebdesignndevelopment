<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Chapter 7 Interactive: CSS Flexbox</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>

  <!-- Standard DAC Head Elements -->
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Foundation:wght@400..700" rel="stylesheet"/>
  <link href="/css/dacStyleSheets.css" rel="stylesheet"/>
<link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>  
  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>

  <!-- Interactive Module Dependencies -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/css/interactive.css" rel="stylesheet"/>
</head>
<body>
  <div class="container-fluid sticky-top px-0 no-print"><div id="nav-placeholder"></div></div>

  <section class="container-fluid my-5">
    <div class="row"><div class="col-12 d-flex flex-column align-items-center">
        
        <nav class="mb-4 w-100 d-flex justify-content-start small fw-bold container">
            <a href="/year1/the-style-advanced-css-layout.html" class="text-decoration-none da-primary">
                <i class="fas fa-angles-left me-1"> Back to Chapter Reading</i>
            </a>
        </nav>

        <div id="interactive-module" class="d-flex justify-content-center w-100 py-4 mb-5">
            <main class="container bg-white rounded-4 shadow-lg overflow-hidden border p-0 interactive-main">
                <div class="row g-0 h-100 module-row">
                    
                    <!-- Code Column -->
                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">
                        <div class="position-absolute top-0 start-0 mt-3 ms-4 text-white-50 small text-uppercase fw-bold letter-spacing-wide">
                            <i class="fas fa-arrows-alt-h me-2"></i> Flex Code
                        </div>
                        
                        <div class="code-font fs-5 fs-md-4 lh-lg mt-4">
                            <span class="code-segment step-hidden syn-sel" data-steps="1,2,3">.flex-container</span> 
                            <span class="code-segment step-hidden syn-punct" data-steps="1,2,3">{</span><br>
                            
                            &nbsp;&nbsp;<span class="code-segment step-hidden syn-prop" data-steps="1,2,3">display</span><span class="code-segment step-hidden syn-punct" data-steps="1,2,3">:</span> 
                            <span class="code-segment step-hidden syn-val" data-steps="1,2,3">flex</span><span class="code-segment step-hidden syn-punct" data-steps="1,2,3">;</span><br>
                            
                            &nbsp;&nbsp;<span class="code-segment step-hidden syn-prop" data-steps="2,3">justify-content</span><span class="code-segment step-hidden syn-punct" data-steps="2,3">:</span> 
                            <span class="code-segment step-hidden syn-val" data-steps="2,3">center</span><span class="code-segment step-hidden syn-punct" data-steps="2,3">;</span><br>

                            &nbsp;&nbsp;<span class="code-segment step-hidden syn-prop" data-steps="3">align-items</span><span class="code-segment step-hidden syn-punct" data-steps="3">:</span> 
                            <span class="code-segment step-hidden syn-val" data-steps="3">center</span><span class="code-segment step-hidden syn-punct" data-steps="3">;</span><br>
                            
                            <span class="code-segment step-hidden syn-punct" data-steps="1,2,3">}</span>
                        </div>

                        <div class="mt-5 preview-wrapper rounded p-4 position-relative overflow-hidden bg-secondary bg-opacity-25 d-flex justify-content-center align-items-center">
                            <div class="position-absolute top-0 end-0 mt-2 me-2 text-uppercase fw-bold preview-badge px-2 py-1 rounded">Container View</div>
                            <div class="preview-box w-100 p-2 rounded transition-all bg-white border shadow-sm" id="preview-container" style="min-height: 200px;">
                                <div class="bg-success rounded p-3 text-center text-white fw-bold shadow-sm mb-2" style="width: 80px;">1</div>
                                <div class="bg-info rounded p-3 text-center text-dark fw-bold shadow-sm mb-2" style="width: 80px;">2</div>
                                <div class="bg-warning rounded p-3 text-center text-dark fw-bold shadow-sm mb-2" style="width: 80px;">3</div>
                            </div>
                        </div>
                    </div>

                    <!-- Content Column -->
                    <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-between bg-white text-dark">
                        <div>
                            <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success rounded-pill small fw-bold mb-4 text-uppercase letter-spacing-wide">Interactive Lesson</div>
                            <h2 class="display-6 fw-bold da-primary mb-2 mt-0">CSS Flexbox</h2>
                            <div class="d-flex gap-1 mb-5 mt-4" id="module-progress"></div>
                            <div id="module-content" class="content-min-height"></div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                            <button class="btn-prev btn text-secondary fw-semibold border-0"><i class="fas fa-arrow-left me-2"></i> Back</button>
                            <button class="btn-next btn bg-da-primary text-white fw-semibold shadow-sm px-4 py-2">Next Step <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div></div>
  </section>


  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "Standard Stacking", icon: "fa-bars", text: "By default, block-level elements stack directly on top of each other. This is standard document flow." },
        { title: "Display: Flex", icon: "fa-arrows-alt-h", text: "When we apply <code>display: flex;</code> to the parent container, the children instantly line up in a row! They are now 'flex items'." },
        { title: "Justify Content", icon: "fa-align-center", text: "We can align items along the main horizontal axis using <code>justify-content</code>. Setting it to <code>center</code> pushes them to the middle." },
        { title: "Align Items", icon: "fa-arrows-alt-v", text: "We can align items along the cross vertical axis using <code>align-items</code>. Setting it to <code>center</code> perfectly centers them vertically inside the container!" }
    ];
    
    const quiz = {
        snippet: `<code class="da-primary fw-bold">justify-content</code><code>:</code> <code>center</code><code>;</code>`,
        question: "Which axis does 'justify-content' align items on by default?",
        options: [
            { text: "The vertical cross axis", isCorrect: false },
            { text: "The horizontal main axis", isCorrect: true },
            { text: "The Z-index depth axis", isCorrect: false }
        ],
        correctText: "Correct! By default, <code>justify-content</code> handles alignment left-to-right on the main horizontal axis.",
        incorrectText: "Remember: 'justify' is usually horizontal (like justifying text), while 'align' handles the vertical cross axis."
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const preview = document.getElementById('preview-container');
        
        // Remove margin bottoms from child elements once flex is active to prevent uneven centering
        const children = preview.children;
        
        // Base state
        preview.className = 'preview-box w-100 p-2 rounded transition-all bg-white border shadow-sm'; 
        Array.from(children).forEach(child => child.classList.add('mb-2'));

        if (step === 1) {
            preview.classList.add('d-flex', 'gap-2');
            Array.from(children).forEach(child => child.classList.remove('mb-2'));
        } else if (step === 2) {
            preview.classList.add('d-flex', 'gap-2', 'justify-content-center');
            Array.from(children).forEach(child => child.classList.remove('mb-2'));
        } else if (step === 3) {
            preview.classList.add('d-flex', 'gap-2', 'justify-content-center', 'align-items-center');
            Array.from(children).forEach(child => child.classList.remove('mb-2'));
        }
    });
  </script>

</body>
