<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Chapter 7 Interactive: CSS Grid Units</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>

  <!-- Standard DAC Head Elements -->
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Foundation:wght@400..700" rel="stylesheet"/>
  <link href="/css/dacStyleSheets.css" rel="stylesheet"/>
<link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>  
  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>

  <!-- Interactive Module Dependencies -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/css/interactive.css" rel="stylesheet"/>
</head>
<body>
  <div class="container-fluid sticky-top px-0 no-print"><div id="nav-placeholder"></div></div>

  <section class="container-fluid my-5">
    <div class="row"><div class="col-12">
        <nav class="mb-4 w-100 d-flex justify-content-start small fw-bold container">
            <a href="/year1/the-style-advanced-css-layout.html" class="text-decoration-none da-primary">
                <i class="fas fa-angles-left me-1"> Back to Chapter Reading</i>
            </a>
        </nav>

        <div id="interactive-module" class="d-flex justify-content-center w-100 py-4 mb-5">
            <main class="container bg-white rounded-4 shadow-lg overflow-hidden border p-0 interactive-main">
                <div class="row g-0 h-100 module-row">
                    
                    <!-- Code Column -->
                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">
                        <div class="position-absolute top-0 start-0 mt-3 ms-4 text-white-50 small text-uppercase fw-bold letter-spacing-wide">
                            <i class="fas fa-table-cells-large me-2"></i> Grid Code
                        </div>
                        
                        <div class="code-font fs-5 fs-md-4 lh-lg mt-4">
                            <span class="code-segment step-hidden syn-sel" data-steps="1,2">.grid-container</span> 
                            <span class="code-segment step-hidden syn-punct" data-steps="1,2">{</span><br>
                            
                            &nbsp;&nbsp;<span class="code-segment step-hidden syn-prop" data-steps="1,2">display</span><span class="code-segment step-hidden syn-punct" data-steps="1,2">:</span> 
                            <span class="code-segment step-hidden syn-val" data-steps="1,2">grid</span><span class="code-segment step-hidden syn-punct" data-steps="1,2">;</span><br>
                            
                            &nbsp;&nbsp;<span class="code-segment step-hidden syn-prop" data-steps="1,2">grid-template-columns</span><span class="code-segment step-hidden syn-punct" data-steps="1,2">:</span> 
                            <span class="code-segment step-hidden syn-val" data-steps="1" id="val-1">1fr 1fr</span><span class="code-segment step-hidden syn-val d-none" data-steps="2" id="val-2">1fr 2fr</span><span class="code-segment step-hidden syn-punct" data-steps="1,2">;</span><br>
                            
                            <span class="code-segment step-hidden syn-punct" data-steps="1,2">}</span>
                        </div>

                        <div class="mt-5 preview-wrapper rounded p-4 position-relative overflow-hidden">
                            <div class="position-absolute top-0 end-0 mt-2 me-2 text-uppercase fw-bold preview-badge px-2 py-1 rounded">Grid View</div>
                            <div class="preview-box w-100 p-2 rounded preview-grid-1" id="preview-container">
                                <div class="bg-success rounded p-3 text-center text-white fw-bold shadow-sm">Menu</div>
                                <div class="bg-info rounded p-3 text-center text-dark fw-bold shadow-sm">Main Content</div>
                            </div>
                        </div>
                    </div>

                    <!-- Content Column -->
                    <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-between bg-white text-dark">
                        <div>
                            <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success rounded-pill small fw-bold mb-4 text-uppercase letter-spacing-wide">Interactive Lesson</div>
                            <h2 class="display-6 fw-bold da-primary mb-2 mt-0">CSS Grid Units</h2>
                            <div class="d-flex gap-1 mb-5 mt-4" id="module-progress"></div>
                            <div id="module-content" class="content-min-height"></div> 
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                            <button class="btn-prev btn text-secondary fw-semibold border-0"><i class="fas fa-arrow-left me-2"></i> Back</button>
                            <button class="btn-next btn text-white bg-da-primary fw-semibold shadow-sm px-4 py-2">Next Step <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div></div>
  </section>


  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "Standard Stacking", icon: "fa-bars", text: "Similar to Flexbox, elements stack by default. Grid is our tool for building rigid, 2-dimensional layouts." },
        { title: "Creating Grid Fractions", icon: "fa-table-columns", text: "We declare <code>display: grid;</code> and set the columns to <code>1fr 1fr</code>. The <strong>fr</strong> unit stands for 'fraction'. This tells the browser to split the free space into two equal halves." },
        { title: "Unequal Fractions", icon: "fa-table-cells-large", text: "If we change the rule to <code>1fr 2fr</code>, we are telling the browser to cut the space into 3 total fractions. It gives 1 slice to the left column, and 2 slices to the right column!" }
    ];
    
    const quiz = {
        snippet: `<code class="da-primary fw-bold">grid-template-columns</code><code>:</code> <code>1fr 2fr</code><code>;</code>`,
        question: "In CSS Grid, what does the <code>fr</code> unit stand for?",
        options: [
            { text: "Frame Ratio", isCorrect: false },
            { text: "Fractional Unit", isCorrect: true },
            { text: "Fixed Resolution", isCorrect: false }
        ],
        correctText: "The <code>fr</code> unit represents a <strong>Fraction</strong> of the available space. <code>1fr 2fr</code> means the second column is twice as wide as the first!",
        incorrectText: "It stands for Fractional Unit. It divides up the remaining free space in the grid container."
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const preview = document.getElementById('preview-container');
        const v1 = document.getElementById('val-1');
        const v2 = document.getElementById('val-2');

        if (step === 0) {
            preview.className = 'preview-box w-100 p-2 rounded preview-grid-1';
            v1.classList.remove('d-none'); v2.classList.add('d-none');
        } else if (step === 1) {
            preview.className = 'preview-box w-100 p-2 rounded preview-grid-2';
            v1.classList.remove('d-none'); v2.classList.add('d-none');
        } else {
            preview.className = 'preview-box w-100 p-2 rounded preview-grid-3';
            v1.classList.add('d-none'); v2.classList.remove('d-none');
        }
    });
  </script>
<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
