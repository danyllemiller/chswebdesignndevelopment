<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Chapter 8 Interactive: Media Queries</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>

  <!-- Standard DAC Head Elements -->
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Foundation:wght@400..700" rel="stylesheet"/>
  
  <link href="/css/dacStyleSheets.css" rel="stylesheet"/>
<link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>  
  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>

  <!-- Interactive Module Dependencies -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/css/interactive.css" rel="stylesheet"/>
</head>
<body>
  <div class="container-fluid sticky-top px-0 no-print"><div id="nav-placeholder"></div></div>

  <section class="container-fluid my-5">
    <div class="row"><div class="col-12 d-flex flex-column align-items-center">
        
        <!-- Fixed Link to Main Chapter -->
        <nav class="mb-4 w-100 d-flex justify-content-start small fw-bold container">
            <a href="/year1/the-style-advanced-css-layout.html" class="text-decoration-none da-primary">
                <i class="fas fa-angles-left me-1"></i> Back to Chapter Reading
            </a>
        </nav>

        <div id="interactive-module" class="d-flex justify-content-center w-100 py-4 mb-5">
            <!-- Removed inline styles and Tailwind classes, using pure Bootstrap & custom classes -->
            <main class="container bg-white rounded-4 shadow-lg overflow-hidden border p-0 interactive-main">
                <div class="row g-0 h-100 module-row">
                    
                    <!-- Code Column -->
                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">
                        <div class="position-absolute top-0 start-0 mt-3 ms-4 text-white-50 small text-uppercase fw-bold letter-spacing-wide">
                            <i class="fas fa-mobile-screen me-2"></i> Media Code
                        </div>
                        
                        <div class="code-font fs-5 fs-md-4 lh-lg mt-4">
                            <span class="code-segment step-hidden syn-punct" data-steps="1,2,3">@media</span> <span class="code-segment step-hidden syn-punct" data-steps="1,2,3">(</span><span class="code-segment step-hidden syn-prop" data-steps="1,2,3">max-width</span><span class="code-segment step-hidden syn-punct" data-steps="1,2,3">:</span> <span class="code-segment step-hidden syn-val" data-steps="1,2,3">600px</span><span class="code-segment step-hidden syn-punct" data-steps="1,2,3">) {</span><br>
                            
                            &nbsp;&nbsp;<span class="code-segment step-hidden syn-sel" data-steps="2,3">.card</span> <span class="code-segment step-hidden syn-punct" data-steps="2,3">{</span><br>
                            
                            &nbsp;&nbsp;&nbsp;&nbsp;<span class="code-segment step-hidden syn-prop" data-steps="3">background-color</span><span class="code-segment step-hidden syn-punct" data-steps="3">:</span> 
                            <span class="code-segment step-hidden syn-val" data-steps="3">blue</span><span class="code-segment step-hidden syn-punct" data-steps="3">;</span><br>
                            
                            &nbsp;&nbsp;<span class="code-segment step-hidden syn-punct" data-steps="2,3">}</span><br>
                            
                            <span class="code-segment step-hidden syn-punct" data-steps="1,2,3">}</span>
                        </div>

                        <div class="mt-5 preview-wrapper rounded p-4 position-relative overflow-hidden bg-secondary bg-opacity-25 d-flex justify-content-center align-items-center">
                            <div class="position-absolute top-0 end-0 mt-2 me-2 text-uppercase fw-bold preview-badge px-2 py-1 rounded">Browser Width</div>
                            
                            <!-- The Device Box (Removed inline transitions, moved to CSS classes) -->
                            <div id="preview-device" class="bg-white rounded border shadow-sm p-3 w-100 device-transition">
                                <div id="preview-card" class="bg-light text-dark rounded p-3 text-center fw-bold card-transition">
                                    Website Content
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Content Column -->
                    <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-between bg-white text-dark">
                        <div>
                            <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success rounded-pill small fw-bold mb-4 text-uppercase letter-spacing-wide">Interactive Lesson</div>
                            <h2 class="display-6 fw-bold da-primary mb-2 mt-0">Media Queries</h2>
                            <div class="d-flex gap-1 mb-5 mt-4" id="module-progress"></div>
                            
                            <!-- Removed inline min-height -->
                            <div id="module-content" class="content-min-height"></div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                            <button class="btn-prev btn text-secondary fw-semibold border-0"><i class="fas fa-arrow-left me-2"></i> Back</button>
                            <button class="btn-next btn bg-da-primary text-white fw-semibold shadow-sm px-4 py-2">Next Step <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div></div>
  </section>


  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "Responsive Design", icon: "fa-desktop", text: "Websites need to look good on massive monitors and tiny phones. To do this, we use conditional CSS rules called Media Queries." },
        { title: "The Condition", icon: "fa-ruler-horizontal", text: "We start with <code>@media</code> and define a condition. Here, <code>(max-width: 600px)</code> means: 'Only apply the following rules if the screen is 600px or smaller'." },
        { title: "The Internal CSS", icon: "fa-code", text: "Inside the media query bracket, we write normal CSS. We select the <code>.card</code> class just like we usually would." },
        { title: "Triggering the Query", icon: "fa-mobile-screen", text: "When we shrink the browser window to simulate a phone, the media query activates, and the card turns blue!" }
    ];
    
    const quiz = {
        snippet: `<code class="da-primary fw-bold">@media</code> (<code>min-width</code>: <code>800px</code>)`,
        question: "When would the CSS inside the snippet above be applied?",
        options: [
            { text: "Only on screens exactly 800px wide", isCorrect: false },
            { text: "Only on screens smaller than 800px", isCorrect: false },
            { text: "Only on screens 800px or larger", isCorrect: true }
        ],
        correctText: "Spot on! <code>min-width</code> means 'At a minimum, the width must be 800px'. It targets larger screens like tablets and desktops.",
        incorrectText: "Pay close attention to 'min-width' vs 'max-width'. 'min-width' acts as a lower limit."
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const device = document.getElementById('preview-device');
        const card = document.getElementById('preview-card');
        
        if (step < 3) {
            device.style.width = '100%'; // Desktop width handled dynamically by JS
            card.className = 'bg-light text-dark rounded p-3 text-center fw-bold card-transition border';
        } else {
            device.style.width = '200px'; // Mobile width handled dynamically by JS
            card.className = 'bg-da-primary text-white rounded p-3 text-center fw-bold card-transition shadow-lg';
        }
    });
  </script>
<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
