<!-- test-site/login-test.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>TESTING: Student Portal | MariaDB Transition</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>

  <!-- Favicon Icons -->
  <link rel="icon" type="image/x-icon" href="/images/favicon/favicon.ico">
  <link rel="shortcut icon" type="image/x-icon" href="/images/favicon/favicon.ico">
  <link rel="apple-touch-icon" href="/images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon/favicon-16x16.png">

  <!-- BootStrap & Fonts -->
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link href="/css/dacStyleSheets.css?v=1.8" rel="stylesheet" />
  
  <!-- The Brain (Logic) -->
  <script src="/js/loader.js?v=6"></script>
  <script type="module" src="/js/login-logic-test.js"></script>
  <!-- Security/Nav Formatter -->
  <script type="module" src="/js/auth-guard.js"></script>
</head>
<body>

  <div class="container-fluid sticky-top px-0 no-print">
    <div id="nav-placeholder"></div>
  </div>

  <div class="container my-5">
    <div class="card shadow-sm border-0 login-card mx-auto" style="max-width: 500px;">
      <div class="card-header bg-danger text-center py-3">
        <h4 class="mb-0 text-white gochi">DATABASE TEST PORTAL</h4>
      </div>
      <div class="card-body p-4">

        <div class="alert alert-info border-info shadow-sm small text-center mb-4" id="test-mode-alert">
          <strong>Testing Mode:</strong> Connecting to local MariaDB server.
        </div>
        
        <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
          <li class="nav-item">
            <button class="nav-link active" id="tab-login" data-bs-toggle="pill" data-bs-target="#pills-login" type="button">Log In</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" id="tab-register" data-bs-toggle="pill" data-bs-target="#pills-register" type="button">Create Account</button>
          </li>
          <li class="nav-item d-none">
            <button class="nav-link" id="tab-clockin" data-bs-toggle="pill" data-bs-target="#pills-clockin" type="button">Clock In</button>
          </li>
        </ul>

        <div id="auth-error" class="alert alert-danger d-none small"></div>

        <div class="tab-content">
          <!-- LOGIN FORM -->
          <div class="tab-pane fade show active" id="pills-login">
            <form id="login-form">
              <div class="mb-3">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" id="login-username" class="form-control" placeholder="e.g. coder99" required>
              </div>
              <div class="mb-2">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" id="login-password" class="form-control" required>
              </div>
              <div class="mb-3 text-end">
                <a href="#" class="small text-decoration-none text-muted" data-bs-toggle="modal" data-bs-target="#resetPasswordModal">Forgot Password?</a>
              </div>
              <button type="submit" class="btn btn-primary w-100 fw-bold">Test Login Connection</button>
            </form>
          </div>

          <!-- REGISTER FORM -->
          <div class="tab-pane fade" id="pills-register">
            <form id="register-form">
              <div class="row g-2 mb-3">
                <div class="col-md-6">
                  <label class="form-label small fw-bold">First Name</label>
                  <input type="text" id="reg-fname" class="form-control" placeholder="Alex" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label small fw-bold">Last Name</label>
                  <input type="text" id="reg-lname" class="form-control" placeholder="Miller" required>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold">Student ID</label>
                <input type="text" id="reg-sid" class="form-control" placeholder="123456" required>
              </div>
              <hr class="my-4 opacity-25">
              <div class="mb-3">
                <label class="form-label small fw-bold">Create a Username</label>
                <input type="text" id="reg-username" class="form-control" placeholder="Lowercase/numbers only" required>
              </div>
              <div class="mb-3">
                <label class="form-label small fw-bold">Create Password</label>
                <input type="password" id="reg-password" class="form-control" required>
              </div>
              <button type="submit" class="btn btn-success w-100 fw-bold">Verify & Create Test Account</button>
            </form>
          </div>

          <!-- CLOCK-IN FORM -->
          <div class="tab-pane fade" id="pills-clockin">
            <div class="text-center mb-4">
                <h5 class="fw-bold">Shift Start Detected</h5>
                <p class="text-muted small">Please answer the daily entry question to clock in.</p>
            </div>
            <form id="clockin-form">
              <div class="mb-4">
                <label class="form-label fw-bold">What is your primary goal for today's development session?</label>
                <textarea id="clockin-answer" class="form-control" rows="3" placeholder="e.g. Completing the CSS Grid exercise..." required></textarea>
              </div>
              <button type="submit" class="btn btn-danger w-100 fw-bold">Clock In & Continue</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SELF-SERVICE RESET PASSWORD MODAL -->
  <div class="modal fade" id="resetPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content shadow border-warning">
        <div class="modal-header bg-warning text-dark py-2">
          <h6 class="modal-title fw-bold mb-0"><i class="fas fa-key me-2"></i>Self-Service Password Recovery</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body bg-light">
          <form id="reset-password-form">
            <div id="reset-error" class="alert alert-danger d-none small"></div>
            <div id="reset-success" class="alert alert-success d-none small"></div>
            
            <p class="small text-muted mb-3">To update your password, enter your official roster enrollment details below to verify your identity:</p>
            
            <div class="row g-2 mb-3">
              <div class="col-md-6">
                <label class="form-label small fw-bold">First Name</label>
                <input type="text" id="reset-fname" class="form-control form-control-sm border-warning fw-bold" required>
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-bold">Last Name</label>
                <input type="text" id="reset-lname" class="form-control form-control-sm border-warning fw-bold" required>
              </div>
            </div>
            
            <div class="row g-2 mb-3">
              <div class="col-md-6">
                <label class="form-label small fw-bold">Student ID</label>
                <input type="text" id="reset-sid" class="form-control form-control-sm border-warning fw-bold" placeholder="e.g. 7001234" required>
              </div>
              <div class="col-md-6">
                <label class="form-label small fw-bold">Username</label>
                <input type="text" id="reset-username" class="form-control form-control-sm border-warning fw-bold" placeholder="e.g. coder99" required autocomplete="username">
              </div>
            </div>
            
            <hr class="my-3 opacity-25">
            
            <div class="mb-3">
              <label class="form-label small fw-bold">Create New Password</label>
              <input type="password" id="reset-new-password" class="form-control form-control-sm border-warning fw-bold" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn btn-warning btn-sm w-100 fw-bold text-dark shadow-sm">Verify Identity & Reset Password</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
</body>
</html>
