<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Teacher Admin | Rubric Manager</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>

  <link rel="icon" type="image/png" href="/images/favicon/favicon.ico">
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  
  <link href="/css/dacStyleSheets.css" rel="stylesheet" />
<link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script type="module" src="/js/auth-guard.js"></script>
</head>
<body class="bg-white">

  <div class="container-fluid sticky-top px-0 no-print">
    <div id="nav-placeholder"></div>
  </div>

  <div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="gochi text-primary mb-0"><i class="fas fa-tasks me-2"></i> Master Rubric Engine</h2>
        <button class="btn btn-success fw-bold shadow-sm" id="btn-create-new">
            <i class="fas fa-plus me-2"></i> Create New Rubric
        </button>
    </div>

    <div class="row g-4">
        <!-- List of existing Rubrics -->
        <div class="col-lg-4">
            <div class="card shadow-sm border-primary h-100">
                <div class="card-header bg-primary text-white fw-bold">
                    <i class="fas fa-list me-2"></i> Saved Rubrics
                </div>
                <div class="card-body p-0">
                    <div class="list-group list-group-flush" id="rubric-list">
                        <div class="p-4 text-center text-muted"><span class="spinner-border spinner-border-sm"></span> Loading...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Rubric Editor Form -->
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 d-none" id="rubric-editor-card">
                <div class="card-header bg-site-secondary border-bottom border-primary py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0 fw-bold text-primary" id="editor-title">Editing Rubric</h5>
                    <span class="badge bg-primary fs-6 font-monospace">4.0 Proficiency Scale</span>
                </div>
                <div class="card-body p-4 bg-white">
                    <form id="rubric-form">
                        <input type="hidden" id="rubric-id">
                        
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="fw-bold small text-muted">Assignment Title</label>
                                <input type="text" class="form-control border-primary fw-bold" id="rubric-title" placeholder="e.g. Project 3: Sights & Sounds" required>
                            </div>
                            <div class="col-md-3">
                                <label class="fw-bold small text-muted">Course Level</label>
                                <select class="form-select border-primary" id="rubric-course">
                                    <option value="Web Design 1">Web Design 1</option>
                                    <option value="Web Design 2">Web Design 2</option>
                                    <option value="Computer Science">Computer Science</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="fw-bold small text-muted">Gradebook Max Pts</label>
                                <input type="number" class="form-control border-primary fw-bold" id="rubric-max-points" value="100" required title="What the final grade is out of (e.g. 100)">
                            </div>
                        </div>

                        <!-- Grading Options -->
                        <div class="bg-light p-3 rounded border mb-4 d-flex gap-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="enable-self-grade" checked>
                                <label class="form-check-label fw-bold small text-dark">Enable Student Self-Reflection Form</label>
                            </div>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="enable-peer-grade" checked>
                                <label class="form-check-label fw-bold small text-dark">Enable Peer Review Form</label>
                            </div>
                        </div>

                        <h6 class="fw-bold border-bottom pb-2 text-primary mb-3">Grading Criteria & Auto-Grader Rules</h6>
                        
                        <div id="criteria-container" class="d-flex flex-column gap-3 mb-4">
                            <!-- Dynamic criteria rows injected here -->
                        </div>

                        <button type="button" class="btn btn-outline-primary btn-sm fw-bold mb-4" id="btn-add-criterion">
                            <i class="fas fa-plus"></i> Add Criterion
                        </button>

                        <div class="d-flex justify-content-between pt-3 border-top">
                            <button type="button" class="btn btn-danger fw-bold" id="btn-delete-rubric"><i class="fas fa-trash"></i> Delete</button>
                            <button type="submit" class="btn btn-success fw-bold px-5 shadow-sm" id="btn-save-rubric"><i class="fas fa-save me-2"></i> Save Rubric</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Empty State -->
            <div id="empty-editor-state" class="text-center p-5 mt-5 text-muted">
                <i class="fas fa-tasks fa-4x mb-3 opacity-25"></i>
                <h4>Select a Rubric</h4>
                <p>Click a rubric on the left to edit it, or create a new one.</p>
            </div>
        </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>
  
  <!-- Corrected Path -->
  <script type="module" src="/js/admin/rubrics.js"></script>
</body>
</html>
