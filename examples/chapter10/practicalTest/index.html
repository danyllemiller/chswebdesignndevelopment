<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelPets Summative</title>
    <link rel="stylesheet" href="style.css">
<link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>
</head>
<body>

    <header>
        <h1>PixelPets Adoption Center</h1>
    </header>

    <main>
        <!-- Pet Cards will be injected here by JavaScript -->
        <div id="pet-container" class="container"></div>

        <!-- Add Pet Form -->
        <section class="form-section">
            <h2>Add a New Pet</h2>
            <form id="add-pet-form">
                <div class="form-group">
                    <label for="pet-name">Pet Name:</label>
                    <input type="text" id="pet-name" placeholder="Enter name...">
                    <span id="name-error" class="error-msg"></span>
                </div>
                <button type="submit">Add Pet</button>
            </form>
        </section>
    </main>

    <script src="main.js"></script>
<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
