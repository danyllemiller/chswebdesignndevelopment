<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static Robot Poster</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .poster-container {
            background: white;
            width: 300px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid #ddd;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .robot-display {
            background-color: #e0e0e0;
            height: 150px;
            width: 150px;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }

        p.status {
            font-weight: bold;
            color: #666;
            margin-bottom: 20px;
        }

        button {
            background-color: #cccccc;
            color: #666;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            font-size: 16px;
            cursor: not-allowed; /* Even the cursor implies static/inactive */
        }
    </style>
<link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>
</head>
<body>

    <div class="poster-container">
        <h1>Model X-100</h1>
        
        <!-- Static Visual -->
        <div class="robot-display">
            🤖
        </div>

        <p class="status">Current Status: ASLEEP</p>

        <!-- This button does absolutely nothing -->
        <button>Wake Up System</button>
    </div>

<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
