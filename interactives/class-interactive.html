        <nav class="mb-4 w-100 d-flex justify-content-start small fw-bold container">
            <a href="/year1/the-clothes-intro-to-css.html" class="text-decoration-none da-primary">
                <i class="fas fa-angles-left me-1"> Back to Chapter 6 Reading</i>

        </nav>

        <div id="interactive-module" class="d-flex justify-content-center w-100 py-4 mb-5">
            <main class="container bg-white rounded-4 shadow-lg overflow-hidden border p-0 interactive-main">
                <div class="row g-0 h-100 module-row">
                    
                    <!-- Code Column -->
                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">
                        <div class="position-absolute top-0 start-0 mt-3 ms-4 text-white-50 small text-uppercase fw-bold letter-spacing-wide">
                            <i class="fas fa-code me-2"></i> CSS Code
                        </div>
                        
                        <div class="code-font fs-5 fs-md-4 lh-lg mt-4">
                            <span class="code-segment step-hidden text-secondary small" data-steps="0,1">&lt;!-- &lt;p class="highlight"&gt;Pay attention to this.&lt;/p&gt; --&gt;</span><br><br>
                            <span class="code-segment step-hidden syn-sel" data-steps="0,1">.highlight</span> <span class="code-segment step-hidden syn-punct" data-steps="0,1">{</span><br>
                            &nbsp;&nbsp;<span class="code-segment step-hidden syn-prop" data-steps="1">background-color</span><span class="code-segment step-hidden syn-punct" data-steps="1">:</span> <span class="code-segment step-hidden syn-val" data-steps="1">yellow</span><span class="code-segment step-hidden syn-punct" data-steps="1">;</span><br>
                            <span class="code-segment step-hidden syn-punct" data-steps="0,1">}</span>
                        </div>

                        <div class="mt-5 preview-wrapper rounded p-4 position-relative overflow-hidden bg-secondary bg-opacity-25 d-flex justify-content-center align-items-center">

                        </div>

                    <!-- Content Column -->

                            <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success rounded-pill small fw-bold mb-4 text-uppercase letter-spacing-wide">Interactive Lesson</div>

                            <button class="btn-next btn text-white bg-da-primary fw-semibold shadow-sm px-4 py-2">Next Step <i class="fas fa-arrow-right ms-2"></i></button>

                    </div>

                </div>
            </main>
        </div>
    </div></div>
  </section>


  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "HTML Classes", icon: "fa-users", text: "In HTML, you can assign an element to a group using the <code>class</code> attribute (e.g., <code>&lt;p class=\"highlight\"&gt;</code>)." },
        { title: "The Period Prefix", icon: "fa-circle", text: "To target that specific class in your CSS, you must prefix the class name with a period (<code>.</code>). This tells the browser you are looking for a Class." }
    ];
    
    const quiz = {
        snippet: `<code class="da-primary fw-bold">.highlight</code> <code>{ background-color: yellow; }</code>`,
        question: "If you want to style elements with the class 'highlight', what is the correct selector syntax?",
        options: [
            { text: "#highlight", isCorrect: false },
            { text: ".highlight", isCorrect: true },
            { text: "highlight", isCorrect: false }
        ],
        correctText: "Spot on! The period (.) is the prefix for targeting class names.",
        incorrectText: "Remember, the # symbol is used for IDs, and no symbol at all is used for generic HTML tags."
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const span = document.getElementById('preview-span');
        if (step === 1) {
            span.style.backgroundColor = '#ffe066';
            span.style.fontWeight = 'bold';
        } else {
            span.style.backgroundColor = 'transparent';
            span.style.fontWeight = 'normal';
        }
    });
  </script>
