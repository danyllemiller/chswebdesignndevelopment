<!DOCTYPE html>
<html lang="en">
<head>
  <!-- interactives/ch8-iframes.html -->
  <meta charset="utf-8"/>
  <title>Chapter 8 Interactive: Iframes</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Foundation:wght@400..700" rel="stylesheet"/>
  <link href="/css/dacStyleSheets.css" rel="stylesheet"/>
  <link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>  
  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/css/interactive.css" rel="stylesheet"/>
</head>
<body>
  <div class="container-fluid sticky-top px-0 no-print"><div id="nav-placeholder"></div></div>

  <section class="container-fluid my-5">
    <div class="row"><div class="col-12">
        <nav class="mb-4 w-100 d-flex justify-content-start small fw-bold container">
            <a href="/year1/sights-and-sounds-media.html" class="text-decoration-none da-primary">
                <i class="fas fa-angles-left me-1"> Back to Chapter Reading</i>
            </a>
        </nav>

        <div id="interactive-module" class="d-flex justify-content-center w-100 py-4 mb-5">
            <main class="container bg-white rounded-4 shadow-lg overflow-hidden border p-0 interactive-main">
                <div class="row g-0 h-100 module-row">
                    
                    <!-- Code Column -->
                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">
                        <div class="position-absolute top-0 start-0 mt-3 ms-4 text-white-50 small text-uppercase fw-bold letter-spacing-wide">
                            <i class="fab fa-youtube me-2"></i> Iframe Code
                        </div>
                        
                        <div class="code-font fs-5 fs-md-4 lh-lg mt-4">
                            <span class="text-warning">&lt;</span><span class="text-info fw-bold">iframe</span><br>
                            
                            &nbsp;&nbsp;<span class="code-segment step-hidden" data-steps="1,2,3">
                                <span class="text-primary">src</span><span class="text-warning">=</span><span class="text-success">"https://youtube.com/embed/..."</span>
                            </span><br>
                            
                            &nbsp;&nbsp;<span class="code-segment step-hidden" data-steps="2">
                                <span class="text-primary">width</span><span class="text-warning">=</span><span class="text-success">"560"</span>
                            </span>
                            <span class="code-segment step-hidden" data-steps="3">
                                <span class="text-primary fw-bold">width</span><span class="text-warning fw-bold">=</span><span class="text-danger fw-bold">"100%"</span>
                            </span><br>
                            
                            <span class="text-warning">&gt;&lt;/</span><span class="text-info fw-bold">iframe</span><span class="text-warning">&gt;</span>
                        </div>

                        <div class="mt-5 preview-wrapper rounded p-2 position-relative overflow-hidden bg-light d-flex justify-content-center align-items-center" style="height: 200px;">
                            <div class="position-absolute top-0 end-0 mt-2 me-2 text-uppercase fw-bold preview-badge px-2 py-1 rounded bg-secondary text-white small">Container</div>
                            
                            <div id="preview-iframe" class="bg-danger text-white d-flex justify-content-center align-items-center shadow" style="height: 100%; transition: width 0.4s;">
                                <i class="fab fa-youtube fs-1"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Content Column -->
                    <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-between bg-white text-dark">
                        <div>
                            <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success rounded-pill small fw-bold mb-4 text-uppercase letter-spacing-wide">Interactive Lesson</div>
                            <h2 class="display-6 fw-bold da-primary mb-2 mt-0">Embedding Media</h2>
                            <div class="d-flex gap-1 mb-5 mt-4" id="module-progress"></div>
                            <div id="module-content" class="content-min-height"></div> 
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                            <button class="btn-prev btn text-secondary fw-semibold border-0"><i class="fas fa-arrow-left me-2"></i> Back</button>
                            <button class="btn-next btn text-white bg-da-primary fw-semibold shadow-sm px-4 py-2">Next Step <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div></div>
  </section>

  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "The Iframe Tag", icon: "fa-window-restore", text: "An <code>&lt;iframe&gt;</code> acts like a window cut into your website that looks out at another website. We use the <code>src</code> attribute to tell it where to look (like a YouTube video link)." },
        { title: "Rigid Pixels", icon: "fa-compress", text: "When you copy an embed code from YouTube, it usually sets fixed pixel widths like <code>width=\"560\"</code>. If a user views this on a tiny 400px mobile phone, the video will break the layout and force horizontal scrolling." },
        { title: "The Responsive Fix", icon: "fa-expand-arrows-alt", text: "To fix this, we change the attribute to a percentage: <code>width=\"100%\"</code>. This forces the iframe to shrink and grow fluidly to fit whatever container it is placed inside!" }
    ];
    
    const quiz = {
        snippet: `&lt;iframe src="youtube..."&gt;&lt;/iframe&gt;`,
        question: "Why is embedding a YouTube video via <code>&lt;iframe&gt;</code> often better than hosting the giant MP4 file on your own server?",
        options: [
            { text: "It allows you to put your own logo on the player.", isCorrect: false },
            { text: "You don't have to pay for the massive bandwidth the video uses.", isCorrect: true },
            { text: "It prevents users from pausing the video.", isCorrect: false }
        ],
        correctText: "Exactly! Video files are huge. By letting Google (YouTube) host and stream the file, their servers handle the heavy lifting, saving your website's bandwidth and loading speed.",
        incorrectText: "Think about the cost of data. Who is paying for the internet traffic when a 1GB video file is downloaded by a user?"
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const frame = document.getElementById('preview-iframe');
        if (step === 0) {
            frame.style.width = '200px';
        } else if (step === 1) {
            frame.style.width = '300px'; // Static appearance
        } else {
            frame.style.width = '100%'; // Responsive appearance
        }
    });
  </script>
</body>
</html>
