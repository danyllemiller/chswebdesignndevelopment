<!DOCTYPE html>
<html lang="en">
<head>
  <!-- interactives/ss-video.html -->
  <meta charset="utf-8"/>
  <title>Chapter 8 Interactive: HTML5 Video</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Foundation:wght@400..700" rel="stylesheet"/>
  <link href="/css/dacStyleSheets.css" rel="stylesheet"/>
  <link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>  
  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/css/interactive.css" rel="stylesheet"/>
</head>
<body>
  <div class="container-fluid sticky-top px-0 no-print"><div id="nav-placeholder"></div></div>

  <section class="container-fluid my-5">
    <div class="row"><div class="col-12">
        <nav class="mb-4 w-100 d-flex justify-content-start small fw-bold container">
            <a href="/year1/sights-and-sounds-media.html" class="text-decoration-none da-primary">
                <i class="fas fa-angles-left me-1"> Back to Chapter Reading</i>
            </a>
        </nav>

        <div id="interactive-module" class="d-flex justify-content-center w-100 py-4 mb-5">
            <main class="container bg-white rounded-4 shadow-lg overflow-hidden border p-0 interactive-main">
                <div class="row g-0 h-100 module-row">
                    
                    <!-- Code Column -->
                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">
                        <div class="position-absolute top-0 start-0 mt-3 ms-4 text-white-50 small text-uppercase fw-bold letter-spacing-wide">
                            <i class="fas fa-video me-2"></i> Video Attributes
                        </div>
                        
                        <div class="code-font fs-5 fs-md-4 lh-lg mt-4">
                            <span class="text-warning">&lt;</span><span class="text-info fw-bold">video</span>
                            <span class="code-segment step-hidden text-danger fw-bold" data-steps="2">controls</span>
                            <span class="code-segment step-hidden text-success fw-bold" data-steps="3">autoplay muted loop</span><span class="text-warning">&gt;</span><br>
                            
                            &nbsp;&nbsp;<span class="text-warning">&lt;</span><span class="text-info fw-bold">source</span> <span class="text-primary">src</span><span class="text-warning">=</span><span class="text-success">"movie.mp4"</span><span class="text-warning">&gt;</span><br>
                            
                            <span class="text-warning">&lt;/</span><span class="text-info fw-bold">video</span><span class="text-warning">&gt;</span>
                        </div>

                        <div class="mt-5 preview-wrapper rounded p-4 position-relative overflow-hidden bg-black text-center d-flex justify-content-center align-items-center" style="height: 200px; border: 2px solid #444;">
                            <div class="position-absolute top-0 end-0 mt-2 me-2 text-uppercase fw-bold preview-badge px-2 py-1 rounded bg-secondary text-white small">Video Player</div>
                            
                            <div id="preview-player" class="w-100 h-100 d-flex flex-column justify-content-end pb-2">
                                <div class="text-white fs-1 mb-auto mt-4"><i class="fas fa-play-circle"></i></div>
                                <div id="preview-controls" class="bg-dark bg-opacity-75 w-100 rounded p-2 d-none d-flex justify-content-between text-white small">
                                    <span><i class="fas fa-play"></i> 0:00</span>
                                    <span><i class="fas fa-volume-up"></i> <i class="fas fa-expand"></i></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Content Column -->
                    <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-between bg-white text-dark">
                        <div>
                            <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success rounded-pill small fw-bold mb-4 text-uppercase letter-spacing-wide">Interactive Lesson</div>
                            <h2 class="display-6 fw-bold da-primary mb-2 mt-0">Native HTML5 Video</h2>
                            <div class="d-flex gap-1 mb-5 mt-4" id="module-progress"></div>
                            <div id="module-content" class="content-min-height"></div> 
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                            <button class="btn-prev btn text-secondary fw-semibold border-0"><i class="fas fa-arrow-left me-2"></i> Back</button>
                            <button class="btn-next btn text-white bg-da-primary fw-semibold shadow-sm px-4 py-2">Next Step <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div></div>
  </section>

  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "The Source", icon: "fa-file-video", text: "To add native video, we use the <code>&lt;video&gt;</code> tag and nest a <code>&lt;source&gt;</code> tag inside it. But without attributes, the video will just look like a static picture!" },
        { title: "Adding Controls", icon: "fa-play", text: "By adding the boolean attribute <code>controls</code> to the opening tag, the browser automatically generates play, pause, and volume buttons for the user." },
        { title: "The Autoplay Rule", icon: "fa-volume-xmark", text: "If you want a video to automatically play in the background (like a hero video), you must use <code>autoplay</code>. However, modern browsers will block autoplay UNLESS you also add the <code>muted</code> attribute so it doesn't blast sound at the user!" }
    ];
    
    const quiz = {
        snippet: `&lt;video autoplay _______ loop&gt;`,
        question: "Which attribute is REQUIRED for a video to autoplay in most modern browsers?",
        options: [
            { text: "controls", isCorrect: false },
            { text: "muted", isCorrect: true },
            { text: "src", isCorrect: false }
        ],
        correctText: "Spot on! To prevent startling users with loud audio, browsers strictly require the <code>muted</code> attribute for any video set to autoplay.",
        incorrectText: "Not quite. Think about what would happen if 10 tabs opened at once and they all started playing sound automatically. What attribute prevents that?"
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const controls = document.getElementById('preview-controls');
        if (step === 0) {
            controls.classList.add('d-none');
            controls.classList.remove('d-flex');
        } else if (step === 1) {
            controls.classList.remove('d-none');
            controls.classList.add('d-flex');
            controls.innerHTML = '<span><i class="fas fa-play"></i> 0:00</span><span><i class="fas fa-volume-up"></i> <i class="fas fa-expand"></i></span>';
        } else {
            controls.classList.remove('d-none');
            controls.classList.add('d-flex');
            controls.innerHTML = '<span><i class="fas fa-pause"></i> 0:04</span><span class="text-danger"><i class="fas fa-volume-mute"></i> <i class="fas fa-expand"></i></span>';
        }
    });
  </script>
</body>
</html>
