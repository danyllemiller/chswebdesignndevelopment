<!DOCTYPE html>
<html lang="en">
<head>
  <!-- interactives/ss-images.html -->
  <meta charset="utf-8"/>
  <title>Chapter 8 Interactive: Image Formats</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>

  <!-- Standard DAC Head Elements -->
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Foundation:wght@400..700" rel="stylesheet"/>
  <link href="/css/dacStyleSheets.css" rel="stylesheet"/>
  <link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>  
  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>

  <!-- Interactive Module Dependencies -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link href="/css/interactive.css" rel="stylesheet"/>
</head>
<body>
  <div class="container-fluid sticky-top px-0 no-print"><div id="nav-placeholder"></div></div>

  <section class="container-fluid my-5">
    <div class="row"><div class="col-12">
        <nav class="mb-4 w-100 d-flex justify-content-start small fw-bold container">
            <a href="/year1/sights-and-sounds-media.html" class="text-decoration-none da-primary">
                <i class="fas fa-angles-left me-1"> Back to Chapter Reading</i>
            </a>
        </nav>

        <div id="interactive-module" class="d-flex justify-content-center w-100 py-4 mb-5">
            <main class="container bg-white rounded-4 shadow-lg overflow-hidden border p-0 interactive-main">
                <div class="row g-0 h-100 module-row">
                    
                    <!-- Code Column -->
                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">
                        <div class="position-absolute top-0 start-0 mt-3 ms-4 text-white-50 small text-uppercase fw-bold letter-spacing-wide">
                            <i class="fas fa-image me-2"></i> Image Code
                        </div>
                        
                        <div class="code-font fs-5 fs-md-4 lh-lg mt-4">
                            <div class="code-segment step-hidden" data-steps="1">
                                <span class="text-muted small">/* Lossy Photo */</span><br>
                                <span class="text-warning">&lt;</span><span class="text-info fw-bold">img</span> 
                                <span class="text-primary">src</span><span class="text-warning">=</span><span class="text-success">"sunset.jpg"</span><span class="text-warning">&gt;</span>
                            </div>

                            <div class="code-segment step-hidden" data-steps="2">
                                <span class="text-muted small">/* Lossless Vector/Logo */</span><br>
                                <span class="text-warning">&lt;</span><span class="text-info fw-bold">img</span> 
                                <span class="text-primary">src</span><span class="text-warning">=</span><span class="text-success">"logo.png"</span><span class="text-warning">&gt;</span>
                            </div>

                            <div class="code-segment step-hidden" data-steps="3">
                                <span class="text-muted small">/* Google's Modern Standard */</span><br>
                                <span class="text-warning">&lt;</span><span class="text-info fw-bold">img</span> 
                                <span class="text-primary">src</span><span class="text-warning">=</span><span class="text-success">"hero.webp"</span><span class="text-warning">&gt;</span>
                            </div>
                        </div>

                        <div class="mt-5 preview-wrapper rounded p-4 position-relative overflow-hidden bg-white text-center d-flex justify-content-center align-items-center" style="min-height: 200px;">
                            <div class="position-absolute top-0 end-0 mt-2 me-2 text-uppercase fw-bold preview-badge px-2 py-1 rounded bg-secondary text-white small">Format Preview</div>
                            <div id="preview-icon" class="display-1 text-primary">
                                <i class="fas fa-camera"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Content Column -->
                    <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-between bg-white text-dark">
                        <div>
                            <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success rounded-pill small fw-bold mb-4 text-uppercase letter-spacing-wide">Interactive Lesson</div>
                            <h2 class="display-6 fw-bold da-primary mb-2 mt-0">Choosing the Right Format</h2>
                            <div class="d-flex gap-1 mb-5 mt-4" id="module-progress"></div>
                            <div id="module-content" class="content-min-height"></div> 
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                            <button class="btn-prev btn text-secondary fw-semibold border-0"><i class="fas fa-arrow-left me-2"></i> Back</button>
                            <button class="btn-next btn text-white bg-da-primary fw-semibold shadow-sm px-4 py-2">Next Step <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div></div>
  </section>

  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "Lossy (JPG)", icon: "fa-camera", text: "<strong>JPGs</strong> use 'Lossy' compression. To make the file size smaller, it permanently deletes tiny bits of mathematical color data. It is best used for complex, multi-colored photographs." },
        { title: "Lossless (PNG)", icon: "fa-shapes", text: "<strong>PNGs</strong> use 'Lossless' compression. They keep all original data perfectly intact, meaning sharper edges but larger file sizes! They also support transparent backgrounds, making them perfect for logos." },
        { title: "The Modern Hybrid (WebP)", icon: "fa-google", text: "<strong>WebP</strong> is a format created by Google. It provides incredibly small file sizes while supporting both lossy/lossless compression AND transparency! It is the modern standard for high-performance websites." }
    ];
    
    const quiz = {
        snippet: `&lt;img src="massive-file.png"&gt;`,
        question: "Which image format was created by Google specifically to provide superior compression and smaller file sizes for the web?",
        options: [
            { text: "JPG", isCorrect: false },
            { text: "SVG", isCorrect: false },
            { text: "WebP", isCorrect: true }
        ],
        correctText: "Correct! WebP provides significantly smaller file sizes than both JPG and PNG, helping keep your Google Lighthouse Performance score high!",
        incorrectText: "Not quite. Think about the modern format developed directly by Google to speed up the internet."
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const icon = document.getElementById('preview-icon');
        if (step === 0) {
            icon.innerHTML = '<i class="fas fa-camera text-primary"></i><div class="fs-4 mt-3 fw-bold">.JPG</div>';
        } else if (step === 1) {
            icon.innerHTML = '<i class="fas fa-shapes text-danger"></i><div class="fs-4 mt-3 fw-bold">.PNG</div>';
        } else {
            icon.innerHTML = '<i class="fab fa-google text-success"></i><div class="fs-4 mt-3 fw-bold">.WEBP</div>';
        }
    });
  </script>
</body>
</html>
