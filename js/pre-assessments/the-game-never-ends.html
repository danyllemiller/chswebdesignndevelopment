  <script>
    // Chapter 17 Comprehensive Diagnostic Pool
    const ch17Pool = [
        { question: "Which of the following best describes a Single Page Application (SPA)?", options: ["A website that only has one page of content.", "A web app that loads a single HTML page and dynamically updates as the user interacts.", "A document that cannot be edited.", "A website that only works on mobile phones."] },
        { question: "When a developer uses a 'Framework' like React or Vue, what is the primary benefit?", options: ["It makes the website's file size smaller.", "It provides pre-written code and components to speed up development.", "It replaces the need for an internet browser.", "It automatically generates all the images for a site."] },
        { question: "What is the primary role of an API Key?", options: ["To unlock the developer's computer.", "To encrypt the user's password.", "To identify and authenticate the calling program to the API service.", "To change the color of the API interface."] },
        { question: "Which HTTP method is typically used to 'fetch' or 'retrieve' data from an API?", options: ["GET", "POST", "PUSH", "DELETE"] },
        { question: "Data from an API is typically delivered in this key-value text format:", options: [".exe", "JSON", ".mp3", ".doc"] },
        { question: "The 'Internet of Things' (IoT) relies heavily on which hardware to collect information?", options: ["Graphics Cards", "Sensors", "Keyboards", "CD-ROM Drives"] },
        { question: "What is a major security concern regarding mass-produced IoT devices?", options: ["Weak default passwords.", "High electricity use.", "No Wi-Fi support.", "They are too heavy."] },
        { question: "Which AI application is most likely used to filter spam emails?", options: ["Pattern Recognition", "Virtual Reality", "Binary Search", "Blockchain"] },
        { question: "What acts as the architectural visual blueprint before any code is written?", options: ["A Database", "A Wireframe", "An API", "A Meta Tag"] },
        { question: "Multi-Factor Authentication (MFA) requires:", options: ["One password.", "Two or more proofs of identity.", "A paid subscription.", "A desktop computer."] },
        { question: "Designing for Voice interfaces like Alexa is known as:", options: ["Haptic UI", "VUI (Voice User Interface)", "Block-level design", "Fixed positioning"] },
        { question: "An HTTP status code of 404 indicates:", options: ["Success", "Forbidden", "Not Found", "Server Error"] },
        { question: "Which subset of AI improves systems through exposure to datasets?", options: ["Machine Learning", "Headless CMS", "Serverless Computing", "Version Control"] },
        { question: "A 'Full Stack Developer' works on:", options: ["Only Front-End", "Only Databases", "Both Front-End and Back-End", "Only CSS"] },
        { question: "Augmented Reality (AR) works by:", options: ["Replacing reality entirely.", "Overlaying digital graphics onto the physical world.", "Increasing internet speed.", "Encrypting passwords."] }
    ];

    const config = {
        questions: ch17Pool,
        questionCount: 15,
        chapterTitle: "Chapter 17: Emerging Tech & Web 3.0",
        webhookUrl: "https://script.google.com/macros/s/AKfycbzgJFP8F23d1C8UtIT1jG-eosRq1YBaA2dfqCIQnPMuZeAfGd1gVPYrObO8UQgkIb3atQ/exec"

  <div id="footer-placeholder"></div>
  <footer class="navbar sticky-bottom bg-body-tertiary">
   <div class="container"><p class="text-center w-100 small mb-0" style="padding: 12px;">Copyright - Danylle Miller Designs 2024</p></div>
  </footer>
  <script>
    (function() {
        const url = "/footer.html";
        fetch(url).then(res => res.text()).then(html => {
            const placeholder = document.getElementById("footer-placeholder");
            if(placeholder) placeholder.innerHTML = html;
            const scripts = placeholder.querySelectorAll("script");
            scripts.forEach(oldScript => {
                const newScript = document.createElement("script");
                Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                oldScript.parentNode.replaceChild(newScript, oldScript);
            });
        }).catch(err => console.error("Footer Load Error:", err));
    })();
  </script>
