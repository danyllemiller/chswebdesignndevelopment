<div class="container mt-5 mb-5" id="dynamic-study-buttons"></div>

<script>
    (function() {
        // --- 1. THE OFFICIAL COURSE MAP ---
        const courseMap = [
            // YEAR 1
            { file: "join-the-developers-guild.html",               folder: "year1", title: "1: Join the Guild" },
            { file: "decoding-the-web-what-it-is-where-it-lives.html", folder: "year1", title: "1: The Developer's World (Internet vs Web)" },
            { file: "the-rules-how-not-to-get-sued.html",           folder: "year1", title: '2: The "Rules" (Law & Ethics)' },
            { file: "the-who-who-are-we-building-for.html",         folder: "year1", title: '4: The "Who" (Personas)' },
            { file: "the-how-how-do-we-plan-a-site.html",           folder: "year1", title: '5: The "How" (Planning)' },
            { file: "the-why-intro-to-uiux.html",                   folder: "year1", title: '4: The Artist (Intro to UI/UX)' },
            { file: "the-bones-intro-to-html.html",                 folder: "year1", title: '7: The "Bones" (HTML)' },
            { file: "the-clothes-intro-to-css.html",                folder: "year1", title: '6: The "Clothes" (CSS)' },
            { file: "the-style-advanced-css-layout.html",           folder: "year1", title: '7: The "Style" (Adv CSS)' },
            { file: "sights-sounds-making-it-pop-html-media.html",  folder: "year1", title: '10: Sights & Sounds (Media)' },
            { file: "the-brains-intro-to-javascript.html",          folder: "year1", title: '9: The "Brains" (Intro to JS)' },
            
            // YEAR 2
            { file: "the-game-dev-advanced-js-game-logic.html",     folder: "year2", title: '12: Game Dev (Adv JS Logic)' },
            { file: "the-cloud-collaboration-hosting.html",         folder: "year2", title: '11: The "Cloud" (Hosting)' },
            { file: "the-manager-cms-platforms.html",               folder: "year2", title: '12: The "Manager" (CMS)' },
            { file: "the-network-intro-to-apis.html",               folder: "year2", title: '13: The "Network" (APIs)' },
            { file: "the-brain-databases.html",                     folder: "year2", title: '14: The "Brain" (Databases)' },
            { file: "the-game-never-ends.html",                     folder: "year2", title: '17: The Game Never Ends' },
            { file: "the-final-boss-going-live.html",               folder: "year2", title: '18: The Final Boss (Live)' }
        ];

        // --- 2. FIND CURRENT PAGE ---
        var currentPath = window.location.pathname;
        var currentFilename = currentPath.split('/').pop();
        
        var currentIndex = -1;
        for (var i = 0; i < courseMap.length; i++) {
            if (currentFilename === courseMap[i].file || currentFilename.includes(courseMap[i].file)) {
                currentIndex = i;
                break;
            }
        }

        // --- 3. OVERWRITE THE BUTTONS ---
        if (currentIndex !== -1) {
            var prevPage = (currentIndex > 0) ? courseMap[currentIndex - 1] : null;
            var nextPage = (currentIndex < courseMap.length - 1) ? courseMap[currentIndex + 1] : null;

            var allLinks = document.getElementsByTagName('a');
            
            for (var j = 0; j < allLinks.length; j++) {
                var linkText = allLinks[j].innerText.toLowerCase();

                if (linkText.includes('previous') || linkText.includes('«')) {
                    if (prevPage) {
                        allLinks[j].href = '/' + prevPage.folder + '/' + prevPage.file;
                        allLinks[j].innerHTML = '&laquo; Previous: ' + prevPage.title; 
                        allLinks[j].style.display = 'inline-block';
                    } else {
                        allLinks[j].href = '/index.html';
                        allLinks[j].innerHTML = '&laquo; Home';
                    }
                }

                if (linkText.includes('next') || linkText.includes('»')) {
                    if (nextPage) {
                        allLinks[j].href = '/' + nextPage.folder + '/' + nextPage.file;
                        allLinks[j].innerHTML = 'Next: ' + nextPage.title + ' &raquo;';
                        allLinks[j].style.display = 'inline-block';
                    } else {
                        allLinks[j].innerHTML = 'Course Complete! &raquo;';
                        allLinks[j].href = '/index.html';
                    }
                }
            }
        }

        // --- 4. STUDY BUTTONS LOGIC ---
        if (currentFilename === "" || currentFilename === "index.html" || currentFilename === "computerscience.html") return;

        var currentFolder = currentPath.split('/').slice(-2, -1)[0]; 
        var chapterFolder = (currentIndex !== -1) ? courseMap[currentIndex].folder : 'year1';

        var allDestinations = [
            { id: 'chapter',      label: "Back to Lesson",      folder: chapterFolder },
            { id: 'techtalk',     label: "Tech Talk A-Z",       folder: "techTalkA-ZGuide" },
            { id: 'tldr',         label: "TL;DR Version",       folder: "toLongDidntRead" },
            { id: 'infographic',  label: "Infographic",         folder: "infographics" },
            { id: 'quiz',         label: "Review Quiz",         folder: "quizes" },
            { id: 'studyGuides',   label: "Study Guide",         folder: "studyGuides" },
            { id: 'reviewGames',  label: "Review Games",        folder: "reviewGames" }
        ];

        var buttonsToShow = allDestinations.filter(function(dest) {
            if ((currentFolder === 'year1' || currentFolder === 'year2') && dest.id === 'chapter') return false;
            if (currentFolder === 'infographics' && dest.id === 'infographic') return false;
            if (currentFolder === 'quizes' && dest.id === 'quiz') return false;
            if (currentFolder === 'techTalkA-ZGuide' && dest.id === 'techtalk') return false;
            if (currentFolder === 'toLongDidntRead' && dest.id === 'tldr') return false;
            return true;
        });

        var html = '<article class="row row-cols-1 row-cols-md-4 g-3 text-center">';
        buttonsToShow.forEach(function(btn) {
            html += '<section class="col">';
            html += '  <a class="btn btn-outline-primary w-100" href="/' + btn.folder + '/' + currentFilename + '">' + btn.label + '</a>';
            html += '</section>';
        });
        html += '</article>';

        var container = document.getElementById('dynamic-study-buttons');
        if (container) container.innerHTML = html;

    })();
</script>
