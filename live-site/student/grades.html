<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <!--/student/grades.html-->
  <title>Student View | My Grades</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  
  <link rel="shortcut icon" href="/images/favicon/favicon.ico">
  <link rel="apple-touch-icon" href="/images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon/favicon-16x16.png">

  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Foundation:wght@400;500;600;700&family=Gochi+Hand&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  
  <!-- Added Chart.js directly to guarantee the graph loads perfectly -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script type="module" src="/js/firebase-init.js"></script>
  <script type="module" src="/js/auth-guard.js"></script>
  
  <link href="/css/dacStyleSheets.css?v=1.2" rel="stylesheet" />
  <link href="/css/student-pages.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container-fluid sticky-top px-0 no-print">
    <div id="nav-placeholder"></div>
  </div>

  <div class="container my-5">
    <div id="student-payroll-container"></div>
    <div id="studentHeader" class="mb-4">
        <div class="d-flex align-items-center">
            <h2 class="gochi text-primary mb-0">My Progress Report</h2>
            <div id="overallBadge" class="d-none"></div>
        </div>
        <p class="text-muted" id="userSubtitle">Initializing secure connection to gradebook...</p>
    </div>

    <div class="row g-3 mb-4" id="statsContainer" style="display:none;">
        <div class="col-md-4">
            <div class="summary-card shadow-sm bg-white p-3 rounded border-start border-4 border-primary">
                <small class="text-uppercase fw-bold text-muted" style="font-size: 0.75rem;">Overall Grade</small>
                <div class="d-flex align-items-end">
                    <h2 id="overallPercent" class="mb-0 text-primary fw-bold">--%</h2>
                    <h4 id="overallLetter" class="mb-0 ms-2 fw-bold text-muted"></h4>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="summary-card shadow-sm bg-white p-3 rounded border-start border-4" style="border-left-color: #34a853 !important;">
                <small class="text-uppercase fw-bold text-muted" style="font-size: 0.75rem;">Assignments Completed</small>
                <h2 id="completedCount" class="mb-0 fw-bold text-dark">0 / 0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="summary-card shadow-sm bg-white p-3 rounded border-start border-4" style="border-left-color: #fbbc05 !important;">
                <small class="text-uppercase fw-bold text-muted" style="font-size: 0.75rem;">Points Earned</small>
                <h2 id="pointsEarned" class="mb-0 fw-bold text-dark">0 pts</h2>
            </div>
        </div>
    </div>
    
    <!-- Badges Section -->
    <div class="card shadow-sm mb-4 border-0 d-none" id="badgesCard">
        <div class="card-header bg-white border-bottom-0 pt-3 pb-0">
            <h6 class="fw-bold text-primary mb-0"><i class="fas fa-award me-2"></i>My Achievements</h6>
        </div>
        <div class="card-body">
            <div id="badgesContainer" class="d-flex flex-wrap gap-3">
                <!-- Badges injected here via JS -->
            </div>
        </div>
    </div>

    <!-- Gradebook Spreadsheet Section -->
    <div class="gradebook-container shadow-sm mb-5">
        <div class="table-responsive table-responsive-gb">
          <table class="table table-spreadsheet mb-0">
            <thead id="gradeHead"></thead>
            <tbody id="gradeBody">
                <tr><td class="p-5 text-center"><div class="spinner-border text-primary"></div><br><small class="text-muted mt-2 d-block">Fetching your scores...</small></td></tr>
            </tbody>
          </table>
        </div>
    </div>

    <!-- ======================================================== -->
    <!-- MASTER GROWTH DASHBOARD INJECTION POINT                  -->
    <!-- ======================================================== -->
    <div id="proficiencyContainer" class="mt-5 mb-5"></div>

  </div>

  <div id="footer-placeholder"></div>

  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>
  
  <script type="module" src="/js/student-grades.js"></script>
  <script type="module" src="/js/student-payroll.js"></script>
  <!-- Master Timeclock Engine -->
  <script type="module" src="/js/timeclock.js"></script>
<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
