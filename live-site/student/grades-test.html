<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Student View | My Grades (TEST)</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  
  <link rel="shortcut icon" href="/images/favicon/favicon.ico">
  <link rel="apple-touch-icon" href="/images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon/favicon-16x16.png">

  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Foundation:wght@400;500;600;700&family=Gochi+Hand&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  
  <!-- Graphing Engine -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Auth Guard formats navigation -->
  <script type="module" src="/js/auth-guard.js"></script>
  
  <link href="/css/dacStyleSheets.css?v=1.2" rel="stylesheet" />
  <link href="/css/student-pages.css" rel="stylesheet" />
</head>
<body class="bg-light">
  <div class="container-fluid sticky-top px-0 no-print">
    <div id="nav-placeholder"></div>
  </div>

  <div class="container my-5">
    <div id="studentHeader" class="mb-4">
        <div class="d-flex align-items-center">
            <h2 class="gochi text-danger mb-0">My Progress Report (TEST)</h2>
        </div>
        <p class="text-muted" id="userSubtitle">Establishing link to MariaDB Guild Records...</p>
    </div>

    <div class="row g-3 mb-4" id="statsContainer">
        <div class="col-md-4">
            <div class="summary-card shadow-sm bg-white p-3 rounded border-start border-4 border-primary">
                <small class="text-uppercase fw-bold text-muted" style="font-size: 0.75rem;">Overall Grade</small>
                <div class="d-flex align-items-end">
                    <h2 id="overallPercent" class="mb-0 text-primary fw-bold">--%</h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="summary-card shadow-sm bg-white p-3 rounded border-start border-4 border-success">
                <small class="text-uppercase fw-bold text-muted" style="font-size: 0.75rem;">Exams Completed</small>
                <h2 id="completedCount" class="mb-0 fw-bold text-dark">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="summary-card shadow-sm bg-white p-3 rounded border-start border-4 border-warning">
                <small class="text-uppercase fw-bold text-muted" style="font-size: 0.75rem;">Total Points</small>
                <h2 id="pointsEarned" class="mb-0 fw-bold text-dark">0 pts</h2>
            </div>
        </div>
    </div>
    
    <!-- Gradebook Section -->
    <div class="card shadow-sm mb-5 border-0">
        <div class="table-responsive">
          <table class="table mb-0">
            <thead class="bg-light">
                <tr>
                    <th class="small fw-bold">Exam Title</th>
                    <th class="small fw-bold text-center">Score</th>
                    <th class="small fw-bold text-center">Status</th>
                </tr>
            </thead>
            <tbody id="gradeBody">
                <tr><td colspan="3" class="p-5 text-center"><div class="spinner-border text-primary"></div></td></tr>
            </tbody>
          </table>
        </div>
    </div>

    <div id="proficiencyContainer" class="mt-5 mb-5">
        <h5 class="gochi text-primary">Performance Insights</h5>
        <div class="bg-white p-4 rounded shadow-sm border">
            <canvas id="gradeChart" height="100"></canvas>
        </div>
    </div>
  </div>

  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>

  <script type="module">
    window.onload = async () => {
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.replace("/login-test.html");
            return;
        }

        document.getElementById('userSubtitle').innerText = `Welcome back, ${user.first_name}. Viewing cohort ${user.section_id || 'Pending Assignment'}.`;

        try {
            // Note: Since this file is in /student/, the root-relative path /api/... still works
            const response = await fetch(`/api/student/grades?student_id=${user.student_id}`);
            const data = await response.json();

            document.getElementById('overallPercent').innerText = `${data.summary.percent}%`;
            document.getElementById('completedCount').innerText = data.summary.completedCount;
            document.getElementById('pointsEarned').innerText = `${data.summary.pointsEarned} pts`;

            const tbody = document.getElementById('gradeBody');
            tbody.innerHTML = '';
            
            if (!data.responses || data.responses.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center p-4 text-muted">No exams completed in the test database yet.</td></tr>';
            } else {
                data.responses.forEach(res => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${res.title}</td>
                            <td class="text-center fw-bold">${res.score} / ${res.total_points}</td>
                            <td class="text-center"><span class="badge bg-success">Recorded</span></td>
                        </tr>
                    `;
                });
            }

            const ctx = document.getElementById('gradeChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.responses.map(r => r.title),
                    datasets: [{
                        label: 'Performance Trend',
                        data: data.responses.map(r => (r.score / r.total_points) * 100),
                        borderColor: '#58a6ff',
                        backgroundColor: 'rgba(88, 166, 255, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    scales: { y: { beginAtZero: true, max: 100 } }
                }
            });

        } catch (err) {
            console.error("Dashboard Fetch Error:", err);
            document.getElementById('gradeBody').innerHTML = '<tr><td colspan="3" class="text-center p-4 text-danger">Error connecting to local MariaDB server.</td></tr>';
        }
    };
  </script>

<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
