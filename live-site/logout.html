<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Logging Out | CHS Web Design</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  
  <!-- Favicon Icons -->
  <link rel="icon" type="image/x-icon" href="/images/favicon/favicon.ico">

  <!-- BootStrap -->
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  
  <style>
    body { 
        background-color: #f8f9fa; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0; 
        font-family: sans-serif;
    }
    .logout-box { 
        text-align: center; 
        padding: 2rem;
        background: white;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .gochi { font-family: 'Gochi Hand', cursive; }
  </style>
  
  <!-- Preconnect for fonts just in case -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">
  <!-- Auth Guard formats the navigation menus! -->
  <script type="module" src="/js/auth-guard.js"></script>
<link href="/css/dacPrint.css" media="print" rel="stylesheet" type="text/css"/>
</head>
<body>

  <div class="logout-box">
    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
    <h3 class="fw-bold text-primary gochi">Logging you out...</h3>
    <p class="text-muted small mb-0">Securing your session and returning to home.</p>
  </div>

  <!-- FIREBASE LOGOUT LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // Your actual Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAK1sGWu6jyWzbxfQCj-cgUBn85mJh9Nv0",
      authDomain: "digitalartsclasses-games-67ae7.firebaseapp.com",
      projectId: "digitalartsclasses-games-67ae7",
      storageBucket: "digitalartsclasses-games-67ae7.firebasestorage.app",
      messagingSenderId: "662051088920",
      appId: "1:662051088920:web:3b05cb890d834c0b9cb16d",
      measurementId: "G-LZ4CXH6X3G"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 1. Trigger the sign out
    signOut(auth).then(() => {
      console.log("User signed out.");
      // 2. 800ms delay for visual feedback, then redirect to home
      setTimeout(() => {
        window.location.replace("/index.html");
      }, 800);
    }).catch((error) => {
      console.error("Sign Out Error", error);
      // Fallback: bounce anyway
      window.location.replace("/index.html");
    });
  </script>
<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
