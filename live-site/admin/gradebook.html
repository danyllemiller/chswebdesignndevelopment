<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Teacher Admin | Master Gradebook</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  
  <link rel="shortcut icon" href="/images/favicon/favicon.ico">
  <link rel="apple-touch-icon" href="/images/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon/favicon-32x32.png">

  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Foundation:wght@400;500;600;700&family=Gochi+Hand&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link href="/css/dacStyleSheets.css?v=1.2" rel="stylesheet" />
  
  <link href="/css/teacher-gradebook.css?v=103.0" rel="stylesheet" />
  
  <script type="module" src="/js/auth-guard.js"></script>
</head>
<body class="bg-light">

  <div class="container-fluid sticky-top px-0 no-print">
    <div id="nav-placeholder"></div>
  </div>

  <div class="container-fluid my-4 px-4">
    <div class="d-flex flex-wrap justify-content-between align-items-center mb-3 gap-3">
        <h2 class="gochi text-primary mb-0">Master Gradebook View</h2>
        
        <div class="d-flex flex-wrap gap-3 align-items-center no-print">
            <select id="periodFilter" class="form-select border-primary text-primary fw-bold shadow-sm w-auto">
                <option value="All">All Periods</option>
                <option value="All-WD1">All Web Design I</option>
                <option value="All-WD2">All Web Design II</option>
                <option value="All-CS">All Computer Science</option>
                <optgroup label="Web Design 1 (Ch 1-8)">
                    <option value="WD1-A1">WD1-A1</option><option value="WD1-B2">WD1-B2</option>
                    <option value="WD1-A3">WD1-A3</option><option value="WD1-B4">WD1-B4</option>
                    <option value="WD1-A5">WD1-A5</option><option value="WD1-B6">WD1-B6</option>
                    <option value="WD1-A7">WD1-A7</option><option value="WD1-B8">WD1-B8</option>
                </optgroup>
                <optgroup label="Web Design 2 (Ch 9-16)">
                    <option value="WD2-A1">WD2-A1</option><option value="WD2-B2">WD2-B2</option>
                    <option value="WD2-A3">WD2-A3</option><option value="WD2-B4">WD2-B4</option>
                    <option value="WD2-A5">WD2-A5</option><option value="WD2-B6">WD2-B6</option>
                    <option value="WD2-A7">WD2-A7</option><option value="WD2-B8">WD2-B8</option>
                </optgroup>
                <optgroup label="Computer Science (Ch 1-18)">
                    <option value="CS-A1">CS-A1</option><option value="CS-B2">CS-B2</option>
                    <option value="CS-A3">CS-A3</option><option value="CS-B4">CS-B4</option>
                    <option value="CS-A5">CS-A5</option><option value="CS-B6">CS-B6</option>
                    <option value="CS-A7">CS-A7</option><option value="CS-B8">CS-B8</option>
                </optgroup>
            </select>
            
            <!-- NEW: Individual Student Filter -->
            <select id="studentFilter" class="form-select border-success text-success fw-bold shadow-sm w-auto">
                <option value="All">All Students in View</option>
            </select>
            
            <button class="btn btn-outline-primary shadow-sm" onclick="window.print()"><i class="fas fa-print"></i> Print</button>
        </div>
    </div>

    <div class="gradebook-container shadow-sm">
        <div class="table-responsive">
          <table class="table-spreadsheet">
            <thead id="gradebookHead"></thead>
            <tbody id="gradebookBody">
                <tr><td class="p-5 text-center"><div class="spinner-border text-primary"></div></td></tr>
            </tbody>
          </table>
        </div>
    </div>
  </div>

  <div id="footer-placeholder" class="no-print"></div>

  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>
  
  <script type="module" src="/js/admin/gradebook.js?v=107"></script>

</body>
</html>
