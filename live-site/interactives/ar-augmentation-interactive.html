                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">

                        </div>
                        
                        <div class="code-font fs-6 fs-md-5 lh-lg mt-4">
                            <span class="code-segment step-hidden text-info" data-steps="1,2,3">const</span> <span class="code-segment step-hidden text-white" data-steps="1,2,3">reality = camera.capture();</span><br>
                            <span class="code-segment step-hidden text-info" data-steps="2,3">const</span> <span class="code-segment step-hidden text-white" data-steps="2,3">digitalData = new Hologram();</span><br><br>
                            
                            <div class="text-secondary mb-2" data-steps="3">// Augmenting Reality</div>
                            <span class="code-segment step-hidden text-warning" data-steps="3">screen</span><span class="code-segment step-hidden text-white" data-steps="3">.</span><span class="code-segment step-hidden text-info" data-steps="3">render</span><span class="code-segment step-hidden text-white" data-steps="3">(</span><br>

                            <!-- Digital Overlay -->
                            <div id="ar-overlay" class="position-relative z-2 bg-white bg-opacity-75 rounded p-3 text-dark text-center shadow-lg transition-all" style="transform: scale(0); opacity: 0;">

            </main>
        </div>
    </div></div>

  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "The Real World", icon: "fa-camera", text: "In AR (Augmented Reality), we always start with a live view of the actual physical world, usually seen through a smartphone camera or glasses." },
        { title: "Digital Information", icon: "fa-database", text: "Our application pulls digital information—like reviews, navigation arrows, or 3D models—from a server." },
        { title: "The 'Augmentation'", icon: "fa-magic", text: "To <strong>augment</strong> means to make something greater by adding to it. In AR, we 'augment' reality by placing the digital data directly over the live view of the real world." }
    ];
    
    const quiz = {
        snippet: `Augment <span class="text-secondary fw-normal">/ôgˈment/ (verb)</span>`,
        question: "In the context of Augmented Reality (AR), what does 'augmentation' refer to?",
        options: [
            { text: "Replacing the real world entirely with a digital one", isCorrect: false },
            { text: "Adding digital elements (like graphics/sounds) to a live view of the real world", isCorrect: true },
            { text: "Upgrading the hardware processing speed of a headset", isCorrect: false }
        ],
        correctText: "Correct! Unlike Virtual Reality (VR) which completely replaces your vision, AR <em>augments</em> (adds to) what you are already seeing in the real world.",
        incorrectText: "Remember the difference between Virtual Reality (a totally fake world) and Augmented Reality."
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const overlay = document.getElementById('ar-overlay');
        if (step === 3) {
            overlay.style.transform = 'scale(1)';
            overlay.style.opacity = '1';
        } else {
            overlay.style.transform = 'scale(0)';
            overlay.style.opacity = '0';
        }
    });
  </script>
