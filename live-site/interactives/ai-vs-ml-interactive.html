<body>
  <div class="container-fluid sticky-top px-0 no-print"><div id="nav-placeholder"></div></div>

  <section class="container-fluid my-5">
    <div class="row"><div class="col-12 d-flex flex-column align-items-center">
        
        <nav class="mb-4 w-100 d-flex justify-content-start small fw-bold container">
            <a href="the-future-data.html" class="text-decoration-none da-primary">
                <i class="fas fa-angles-left me-1"></i> Back to Chapter 17 Reading
            </a>
        </nav>

        <div id="interactive-module" class="d-flex justify-content-center w-100 py-4 mb-5">
            <main class="container bg-white rounded-4 shadow-lg overflow-hidden border p-0 interactive-main">
                <div class="row g-0 h-100 module-row">
                    
                    <!-- Code Column -->
                    <div class="col-12 col-md-6 code-panel bg-dark text-white p-4 p-md-5 d-flex flex-column justify-content-center position-relative">
                        <div class="position-absolute top-0 start-0 mt-3 ms-4 text-white-50 small text-uppercase fw-bold letter-spacing-wide">
                            <i class="fas fa-brain me-2"></i> Logic vs Learning
                        </div>
                        
                        <div class="code-font fs-6 fs-md-5 lh-lg mt-4">
                            <div class="text-secondary mb-2">// Traditional AI (Hardcoded Rules)</div>
                            <span class="code-segment step-hidden text-info" data-steps="1,2,3">if</span> 
                            <span class="code-segment step-hidden text-white" data-steps="1,2,3">(</span><span class="code-segment step-hidden text-warning" data-steps="1,2,3">obstacle</span><span class="code-segment step-hidden text-white" data-steps="1,2,3">) {</span><br>
                            &nbsp;&nbsp;<span class="code-segment step-hidden text-success" data-steps="1,2,3">turnRight();</span><br>
                            <span class="code-segment step-hidden text-white" data-steps="1,2,3">}</span><br><br>

                            <div class="text-secondary mb-2">// Machine Learning (Data-Driven)</div>
                            <span class="code-segment step-hidden text-warning" data-steps="2,3">model</span><span class="code-segment step-hidden text-white" data-steps="2,3">.</span><span class="code-segment step-hidden text-info" data-steps="2,3">train</span><span class="code-segment step-hidden text-white" data-steps="2,3">(</span><span class="code-segment step-hidden text-success" data-steps="2,3">pastExperiences</span><span class="code-segment step-hidden text-white" data-steps="2,3">);</span><br>
                            <span class="code-segment step-hidden text-warning" data-steps="3">model</span><span class="code-segment step-hidden text-white" data-steps="3">.</span><span class="code-segment step-hidden text-info" data-steps="3">predict</span><span class="code-segment step-hidden text-white" data-steps="3">(</span><span class="code-segment step-hidden text-success" data-steps="3">newObstacle</span><span class="code-segment step-hidden text-white" data-steps="3">);</span>
                        </div>

                        <div class="mt-5 preview-wrapper rounded p-4 position-relative overflow-hidden bg-secondary bg-opacity-25 d-flex flex-column justify-content-center align-items-center">
                            <div class="position-absolute top-0 end-0 mt-2 me-2 text-uppercase fw-bold preview-badge px-2 py-1 rounded text-dark">Concept View</div>
                            <i id="preview-icon" class="fas fa-robot display-1 text-white opacity-50 transition-all mb-3"></i>
                            <h4 id="preview-heading" class="text-white fw-bold transition-all text-center">Artificial Intelligence</h4>
                        </div>
                    </div>

                    <!-- Content Column -->
                    <div class="col-12 col-md-6 p-4 p-md-5 d-flex flex-column justify-content-between bg-white text-dark">
                        <div>
                            <div class="d-inline-block px-3 py-1 bg-success bg-opacity-10 text-success rounded-pill small fw-bold mb-4 text-uppercase letter-spacing-wide">Interactive Lesson</div>
                            <h2 class="display-6 fw-bold da-primary mb-2 mt-0">AI vs ML</h2>
                            <div class="d-flex gap-1 mb-5 mt-4" id="module-progress"></div>
                            <div id="module-content" class="content-min-height"></div>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mt-5 pt-4 border-top">
                            <button class="btn-prev btn text-secondary fw-semibold border-0"><i class="fas fa-arrow-left me-2"></i> Back</button>
                            <button class="btn-next btn text-white bg-da-primary fw-semibold shadow-sm px-4 py-2">Next Step <i class="fas fa-arrow-right ms-2"></i></button>
                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div></div>
  </section>


  <script src="/js/interactive.js"></script>
  <script>
    const steps = [
        { title: "Broad Concept: AI", icon: "fa-robot", text: "<strong>Artificial Intelligence (AI)</strong> is the broad concept of a machine capable of carrying out tasks in a way we would consider 'smart'. Early AI just followed strict, pre-programmed 'if/then' rules." },
        { title: "The Subset: ML", icon: "fa-project-diagram", text: "<strong>Machine Learning (ML)</strong> is a specific subset of AI. Instead of giving the machine strict rules, we give it lots of data and let it find the patterns on its own." },
        { title: "Learning from Data", icon: "fa-brain", text: "With Machine Learning, the system gets better at its task over time as it is exposed to more data. It 'learns' without being explicitly programmed for every scenario." }
    ];
    
    const quiz = {
        snippet: `<i class="fas fa-robot da-primary me-2"></i> Artificial Intelligence vs. Machine Learning`,
        question: "What is the key difference between general AI and Machine Learning (ML)?",
        options: [
            { text: "AI is hardware, ML is software", isCorrect: false },
            { text: "ML is a subset of AI where the machine learns from data", isCorrect: true },
            { text: "AI only works on the cloud, ML works offline", isCorrect: false }
        ],
        correctText: "Spot on! Machine Learning is a specific application of AI based around the idea that we should give machines access to data and let them learn for themselves.",
        incorrectText: "Think about the word 'Learning'. How does a machine learn compared to just following a script?"
    };
    
    new InteractiveModule(steps, quiz, (step) => {
        const heading = document.getElementById('preview-heading');
        const icon = document.getElementById('preview-icon');
        
        if (step === 1) {
            heading.innerText = "General AI";
            icon.className = "fas fa-robot display-1 text-info transition-all mb-3";
        } else if (step === 2) {
            heading.innerText = "Machine Learning";
            icon.className = "fas fa-project-diagram display-1 text-warning transition-all mb-3";
        } else if (step === 3) {
            heading.innerText = "Data-Driven Decisions";
            icon.className = "fas fa-brain display-1 text-success transition-all mb-3";
        }
    });
  </script>
<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
