    <script>
        const logEl = document.getElementById('console-log');
        const poolEl = document.getElementById('pool-count');

        function addLog(msg, type = 'info') {
            const p = document.createElement('p');
            const colors = { info: 'text-slate-300', success: 'text-green-400', error: 'text-red-400', warning: 'text-yellow-400' };
            p.className = `mb-1 ${colors[type]}`;
            p.innerHTML = `> ${msg}`;
            logEl.appendChild(p);
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function runMigration() {
            const pool = window.migrationPool || [];
            if (pool.length === 0) return addLog("No data found in window.migrationPool. Ensure your .js files use the push() method.", "error");

            const btn = document.getElementById('migrate-btn');
            btn.disabled = true;
            btn.classList.add('opacity-50');
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('upload-status').textContent = "In Progress";

            try {
                const config = {
                    apiKey: "AIzaSyAK1sGWu6jyWzbxfQCj-cgUBn85mJh9Nv0",
                    authDomain: "digitalartsclasses-games-67ae7.firebaseapp.com",
                    projectId: "digitalartsclasses-games-67ae7",
                    appId: "1:662051088920:web:3b05cb890d834c0b9cb16d"
                };

                // Import required Firebase modules
                const { initializeApp, getApps, deleteApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                const { getAuth, signInAnonymously } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js");
                const { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");

                // SAFE INITIALIZATION: 
                // 1. Check if an app is already running (from the 21 data files)
                // 2. Kill it so the Dashboard can use its own fresh config
                const existingApps = getApps();
                if (existingApps.length > 0) {
                    addLog("Clearing existing Firebase instances...", "info");
                    for (let appInstance of existingApps) {
                        await deleteApp(appInstance);
                    }
                }

                const app = initializeApp(config);
                const db = getFirestore(app);
                await signInAnonymously(getAuth(app));
                
                const colRef = collection(db, 'artifacts', config.appId, 'public', 'data', 'questions');
                
                // ==========================================
                // WIPE EXISTING DATA BEFORE UPLOAD
                // ==========================================
                addLog("Querying existing database to wipe old questions...", "warning");
                const querySnapshot = await getDocs(colRef);
                const deletePromises = [];
                
                querySnapshot.forEach((documentSnapshot) => {
                    deletePromises.push(deleteDoc(doc(db, 'artifacts', config.appId, 'public', 'data', 'questions', documentSnapshot.id)));
                });
                
                if (deletePromises.length > 0) {
                    addLog(`Deleting ${deletePromises.length} old questions...`, "info");
                    await Promise.all(deletePromises);
                    addLog("Database wiped clean. Ready for new data.", "success");
                } else {
                    addLog("Database is already empty. Proceeding to upload...", "info");
                }
                
                // ==========================================
                // UPLOAD NEW DATA
                // ==========================================
                let count = 0;
                addLog(`Bulk process started for ${pool.length} items...`, "warning");

                for (const item of pool) {
                    // Ensure every item is marked as "unified" for the new game engines
                    await addDoc(colRef, { ...item, type: "unified" });
                    count++;
                    
                    const percent = Math.round((count / pool.length) * 100);
                    document.getElementById('progress-bar').style.width = percent + '%';
                    document.getElementById('progress-percent').textContent = percent + '%';
                    document.getElementById('progress-text').textContent = `Uploading ${count}/${pool.length}`;
                    
                    if(count % 25 === 0) addLog(`Checkpoint: ${count} items uploaded.`, "info");
                }

                addLog(`🏁 SUCCESS: ${count} items pushed to the cloud!`, "success");
                document.getElementById('upload-status').textContent = "Complete";
            } catch (err) {
                addLog(`CRITICAL ERROR: ${err.message}`, "error");
                document.getElementById('upload-status').textContent = "Failed";
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        }

        // Wait a moment for all scripts to dump data into the pool
        setTimeout(() => { 
            poolEl.textContent = window.migrationPool.length; 
            addLog(`Pool ready with ${window.migrationPool.length} questions.`, "info");
        }, 2000);
    </script>
