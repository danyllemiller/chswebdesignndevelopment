  <script>
    // Chapter 11 Question Pool (30+ questions mapped to required exam concepts)
    const ch11Pool = [
        { question: "Which symbol is used for 'Strict Equality' (checking both value and type)?", options: ["==", "!==", "===", "="], correct: 2 },
        { question: "What is the mathematical result of 10 % 3?", options: ["10", "3", "0", "1"], correct: 3 },
        { question: "What is the result of the logic statement: (true && false)?", options: ["True", "False", "Null", "Undefined"], correct: 1 },
        { question: "Which DOM selector is most flexible and uses CSS-style syntax (e.g., #id or .class)?", options: ["getElementById", "selectElement", "querySelector", "getElementsByClassName"], correct: 2 },
        { question: "How do you change the text inside an HTML element via JavaScript?", options: [".changeText", ".textContent", ".content", ".textValue"], correct: 1 },
        { question: "What property retrieves the text typed into an <input> box by a user?", options: [".innerText", ".textContent", ".value", ".input"], correct: 2 },
        { question: "Which operator is used for 'OR' in JavaScript logic?", options: ["&&", "!!", "??", "||"], correct: 3 },
        { question: "What does element.classList.toggle('active') do?", options: ["Always adds the class.", "Always removes the class.", "Adds 'active' if missing; removes it if present.", "Deletes the element."], correct: 2 },
        { question: "Which event fires as soon as a user types a single character into an input box?", options: ["'submit'", "'click'", "'load'", "'input'"], correct: 3 },
        { question: "What is 'Event Bubbling'?", options: ["When an event triggers on a child and moves up to its parents.", "When an image fails to load.", "When a page reloads automatically.", "When memory is cleared."], correct: 0 },
        { question: "How do you write a single-line comment in JavaScript?", options: ["/* Comment */", "# Comment", "``", "// Comment"], correct: 3 },
        { question: "What is the correct way to convert a string like '5' into an actual mathematical number?", options: ["String('5')", "Int('5')", "Number('5')", "math('5')"], correct: 2 },
        { question: "What happens if you declare a variable with 'const' and try to re-assign its value?", options: ["The code runs anyway.", "The computer restarts.", "The browser throws a TypeError.", "The variable becomes null."], correct: 2 },
        { question: "Why is JavaScript called a 'Client-Side' language?", options: ["It runs in the user's browser, not on a remote server.", "It only works for paid clients.", "It builds operating systems.", "It requires a subscription."], correct: 0 },
        { question: "Which keyword is used to declare a variable that is expected to change its value?", options: ["var", "const", "let", "change"], correct: 2 },
        { question: "What is the result of '5' + 5 in JavaScript?", options: ["10", "55", "Error", "Undefined"], correct: 1 },
        { question: "Which method prevents a form from submitting and refreshing the page?", options: ["event.stop()", "event.halt()", "event.preventDefault()", "form.pause()"], correct: 2 },
        { question: "What does the 'DOMContentLoaded' event ensure?", options: ["Downloads images instantly.", "The HTML is fully parsed before the JS runs.", "Turns the page to PDF.", "Blocks ads."], correct: 1 },
        { question: "How do you write a multi-line comment in JavaScript?", options: ["// Comment //", "<!-- Comment -->", "/* Comment */", "** Comment **"], correct: 2 },
        { question: "Which of the following is NOT a primitive data type in JavaScript?", options: ["String", "Boolean", "Object", "Number"], correct: 2 },
        { question: "What is an Array in JavaScript?", options: ["A function returning a number.", "A single variable holding a numbered list of multiple items.", "An HTML element.", "A CSS property."], correct: 1 },
        { question: "How do you access the 'name' property of an object named 'player'?", options: ["player[name]", "player->name", "player.name", "player(name)"], correct: 2 },
        { question: "Which loop is designed to iterate over the values in an Array?", options: ["while", "for...of", "do...while", "for...in"], correct: 1 },
        { question: "What does document.createElement('div') do?", options: ["Finds a div.", "Creates a new div invisibly in memory.", "Deletes a div.", "Styles a div."], correct: 1 },
        { question: "After creating an element, how do you make it visible on the page?", options: ["element.show()", "document.display(element)", "parent.appendChild(element)", "element.visible = true"], correct: 2 },
        { question: "What is the purpose of Template Literals (backticks)?", options: ["Multi-line comments.", "Injecting variables into strings using ${ }.", "Selecting elements.", "Writing CSS."], correct: 1 },
        { question: "Which of the following is an example of Server-Side scripting?", options: ["Turning a button red.", "Client-side validation.", "Checking passwords against a database.", "Animating images."], correct: 2 },
        { question: "What is a 'ReferenceError'?", options: ["A syntax typo.", "Using a variable that hasn't been declared.", "Comparing strings to numbers.", "Missing a semicolon."], correct: 1 },
        { question: "What are 'Parameters' in a function?", options: ["The output.", "Variables inside parentheses acting as 'ingredients'.", "CSS styles.", "The trigger event."], correct: 1 },
        { question: "What is 'Scope' in programming?", options: ["The window size.", "Rules defining where variables can be used.", "Code speed.", "Line count."], correct: 1 },
        { question: "A variable declared inside a function using 'let' is:", options: ["Global.", "Local (accessible only inside that function).", "Saved to a database.", "A constant."], correct: 1 },
        { question: "What does the += operator do?", options: ["Assigns a new value.", "Subtracts.", "Adds a value to the existing value.", "Multiplies."], correct: 2 }
    ];

    // Initialize the quiz: Picks 10 random questions from the 32+ pool
    window.onload = () => initQuiz(ch11Pool);
