    const pool = [
        { question: "The federal legislation that directly funds equipment and training for our Career and Technical Education (CTE) classroom is called the:", options: ["Carl D. Perkins Law", "Open Web Act", "Berners-Lee Initiative", "Digital Accessibility Law"], correct: 0 },
        { question: "By operating our classroom as a professional digital agency, we are actively participating in which Career and Technical Student Organization (CTSO)?", options: ["SkillsUSA", "DECA", "FBLA", "HOSA"], correct: 0 },
        { question: "During a chapter meeting, how do you formally introduce an action for the Guild to debate and vote on?", options: ["By stating 'I move that we...'", "By yelling out your idea", "By sending an email to the President", "By forming a committee"], correct: 0 },
        { question: "While coding HTML is a 'hard skill', abilities like effective communication, empathy, and time management are highly valued by employers and known as:", options: ["Soft Skills", "Hardware Skills", "Debugging Tools", "Technical Requirements"], correct: 0 },
        { question: "If you specialize in building the 'engine room' of a website—including servers, databases, and security logic—what class of developer are you?", options: ["Back-End Developer", "Front-End Developer", "UI/UX Designer", "QA Tester"], correct: 0 },
        { question: "What is the 'Project Triangle' rule for building an MVP (Minimum Viable Product)?", options: ["You can only pick two: Fast, Cheap, or Good", "Always choose the most expensive option", "Speed is the only thing that matters", "Clients prefer cheap and slow projects"], correct: 0 },
        { question: "What debugging technique involves explaining your code line-by-line to an inanimate object to find your own mistakes?", options: ["Rubber Duck Debugging", "Spamdexing", "Client-Server Modeling", "Agile Sprints"], correct: 0 },
        { question: "Deceptive UI tricks meant to manipulate users into clicking things they didn't intend to are called:", options: ["Dark Patterns", "Visual Hierarchies", "Creative Commons", "White Space"], correct: 0 },
        { question: "The legal contract professionals sign to protect a company's Trade Secrets is called an:", options: ["NDA (Non-Disclosure Agreement)", "SSL Certificate", "ICANN Registration", "Open Source License"], correct: 0 },
        { question: "The physical network of cables, routers, and servers connecting the globe is called the:", options: ["Internet", "World Wide Web", "Intranet", "Cloud"], correct: 0 },
        { question: "What is the 'phone book' of the internet that translates human-readable domain names into IP addresses?", options: ["DNS (Domain Name System)", "HTTP (Hypertext Transfer Protocol)", "W3C (World Wide Web Consortium)", "CTSO (Career and Technical Student Organization)"], correct: 0 },
        { question: "Which of the following is the MANDATORY, non-negotiable filename for a website's homepage?", options: ["index.html", "home.html", "main.html", "start.html"], correct: 0 },
        { question: "The 'S' in HTTPS stands for Secure. What does a website need to establish this encrypted connection?", options: ["An SSL Certificate", "A Content Delivery Network (CDN)", "A fast IP Address", "A Private Intranet"], correct: 0 },
        { question: "Which web language is considered the 'Bones' or structure of a webpage?", options: ["HTML", "CSS", "JavaScript", "Python"], correct: 0 },
        { question: "Renting a 'Take and Bake' pizza where you get the raw infrastructure but configure it yourself is an analogy for which Cloud Service Model?", options: ["IaaS (Infrastructure as a Service)", "PaaS (Platform as a Service)", "SaaS (Software as a Service)", "DaaS (Database as a Service)"], correct: 0 },
        { question: "Arranging elements on a page by size and color so the user's eye is naturally guided to the most important information first is known as:", options: ["Visual Hierarchy", "Search Engine Optimization", "Spamdexing", "Rubber Ducking"], correct: 0 },
        { question: "A global network of 'edge servers' that copies your static files and stores them worldwide to speed up your website is called a:", options: ["CDN (Content Delivery Network)", "DNS (Domain Name System)", "VPN (Virtual Private Network)", "CTSO (Career Technical Organization)"], correct: 0 },
        { question: "Automatic legal protection for original creative works (like code, photos, text) that you create is called:", options: ["Copyright", "Trademark", "Patent", "Fair Use"], correct: 0 },
        { question: "Deceptive techniques used to artificially boost a website's ranking on search engines (like keyword stuffing) are called:", options: ["Spamdexing", "Search Engine Optimization (SEO)", "Phishing", "Hashing"], correct: 0 },
        { question: "What principle states that designing for marginalized users (like adding alt-text for the blind) makes the web better for everyone?", options: ["The Curb Cut Effect", "The Magic Triangle", "The Agile Methodology", "The Client-Server Model"], correct: 0 }
    ];
    window.onload = () => initQuiz(pool);
