<script type="module">
    // Triggers the centralized MariaDB dynamic question loader for Unit 1
    const runCSPreTest = () => {
        if (window.initCSPreTest) {
            window.initCSPreTest(1);
        } else {
            console.error("[Pre-Test Error] window.initCSPreTest engine was not found.");
        }
    };

    // Ensure module scripts are fully processed before initialization execution
    if (document.readyState === "loading") {
        document.addEventListener('DOMContentLoaded', runCSPreTest);
    } else {
        runCSPreTest();
    }
  </script>
