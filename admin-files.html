<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Teacher Admin | Student Files</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  
  <link rel="shortcut icon" href="/images/favicon/favicon.ico">
  <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Auth Guard formats the navigation menus! -->
  <script type="module" src="/js/auth-guard.js"></script>
  <!-- Global Styles -->
  <link href="/css/dacStyleSheets.css?v=1.4" rel="stylesheet" />
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="container my-4" style="max-width: 1200px;">
    
    <div class="d-flex flex-wrap justify-content-between align-items-end mb-4 gap-3 border-bottom border-primary pb-3">
        <div>
            <h2 class="gochi text-primary mb-1"><i class="fas fa-folder-open me-2"></i>Student Workspace Explorer</h2>
            <p class="text-muted mb-0" style="font-family: var(--font-family-base);">View and manage individual student web hosting directories.</p>
        </div>
        
        <div class="d-flex align-items-center gap-3 bg-light p-2 rounded border border-secondary shadow-sm">
            <div id="adminControlStatus" class="fw-bold font-monospace small text-secondary px-2 py-1">
                <i class="fas fa-lock"></i> Locked: No Help Requested
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-md-4 mb-2">
            <label class="form-label fw-bold text-primary font-monospace small">Filter Period</label>
            <select id="periodFilter" class="form-select border-primary shadow-sm">
    <option value="All">All Periods</option>
    <optgroup label="Web Design 1 (Ch 1-8)">
        <option value="WD1-A1">WD1-A1</option><option value="WD1-B2">WD1-B2</option>
        <option value="WD1-A3">WD1-A3</option><option value="WD1-B4">WD1-B4</option>
        <option value="WD1-A5">WD1-A5</option><option value="WD1-B6">WD1-B6</option>
        <option value="WD1-A7">WD1-A7</option><option value="WD1-B8">WD1-B8</option>
    </optgroup>
    <optgroup label="Web Design 2 (Ch 9-16)">
        <option value="WD2-A1">WD2-A1</option><option value="WD2-B2">WD2-B2</option>
        <option value="WD2-A3">WD2-A3</option><option value="WD2-B4">WD2-B4</option>
        <option value="WD2-A5">WD2-A5</option><option value="WD2-B6">WD2-B6</option>
        <option value="WD2-A7">WD2-A7</option><option value="WD2-B8">WD2-B8</option>
    </optgroup>
    <optgroup label="Computer Science (Ch 1-18)">
        <option value="CS-A1">CS-A1</option><option value="CS-B2">CS-B2</option>
        <option value="CS-A3">CS-A3</option><option value="CS-B4">CS-B4</option>
        <option value="CS-A5">CS-A5</option><option value="CS-B6">CS-B6</option>
        <option value="CS-A7">CS-A7</option><option value="CS-B8">CS-B8</option>
    </optgroup>
</select>
        </div>
        <div class="col-md-8 mb-2">
            <label class="form-label fw-bold text-primary font-monospace small">Select Student</label>
            <select id="studentSelect" class="form-select border-primary shadow-sm" disabled>
                <option value="">Loading roster...</option>
            </select>
        </div>
    </div>

    <div id="workspaceContainer" class="d-none">
        <div class="card shadow-sm border-primary">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3">
                <div id="userSubtitle" class="font-monospace text-white">
                    <span class="text-white-50">Select a student to load workspace...</span>
                </div>
                <span id="fileCountBadge" class="badge bg-secondary text-primary font-monospace fs-6">0 Files</span>
            </div>
            
            <div class="card-body p-0">
                <div id="bulk-actions-toolbar" class="bg-secondary p-3 border-bottom border-primary d-none d-flex justify-content-between align-items-center">
                    <div class="small fw-bold text-primary font-monospace px-2"><span id="selected-file-count">0</span> item(s) selected</div>
                    <div class="d-flex gap-2">
                        <button id="btn-bulk-move" class="btn btn-sm btn-info text-white fw-bold shadow-sm"><i class="fas fa-random"></i> Move Selected</button>
                        <button id="btn-bulk-delete" class="btn btn-sm btn-danger text-white fw-bold shadow-sm"><i class="fas fa-trash"></i> Delete Selected</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle file-table">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 5%;" class="admin-col d-none">
                                    <input type="checkbox" id="selectAllFiles" style="cursor: pointer;">
                                </th>
                                <th style="width: 45%;">Name</th>
                                <th style="width: 15%;">Size</th>
                                <th style="width: 15%;">Modified</th>
                                <th style="width: 20%;" class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="fileListBody">
                            <tr><td colspan="5" class="text-center p-5 text-muted fw-bold">Select a student from the dropdown above to view files.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="/js/bootstrap.bundle.js"></script>
  <script src="/js/jquery.js"></script>
  <script src="/js/loader.js?v=6"></script>
  <!-- BROKEN FONTAWESOME KIT SCRIPT REMOVED -->
  <script type="module" src="/js/admin-files.js"></script>
<a href="#" class="back-to-top text-decoration-none" title="Back to Top">🚀</a>
</body>
</html>
