  <!--Navigation-->
  <div class="container-fluid sticky-top px-0 no-print">

  <section class="container-ultrawide my-5">
    <!-- Back to Lesson Link -->
    <nav class="mb-4 d-flex justify-content-between small fw-bold no-print">

    <div id="exam-container">
        <div class="text-center p-5">
            <div class="spinner-border text-info"></div>
            <p class="mt-2 fw-bold text-primary">Syncing Guild Secure Environment...</p>
        </div>
    </div>
  </section>

<script>
    window.onload = async () => {
        // Fetch questions from the API based on unit number
        try {
            const unit = 1;
            const allQuestions = await window.fetchQuestionsForWeightedMix(unit);
            // Unit 1 gets 100% unit 1 questions, target 25 questions
            const questions = window.getWeightedQuestions(allQuestions, unit, 25);
            
            initAdaptiveExam({
                unit: 1,
                chapterTitle: "Unit 1: The Digital Foundation",
                questionCount: questions.length,
                useWeightedMix: true,
                questions: questions
            });
        } catch (err) {
            console.error("Failed to load exam questions:", err);
            document.getElementById('exam-container').innerHTML = `
                <div class="alert alert-danger text-center">
                    <h4>Error Loading Exam</h4>
                    <p>Could not load questions from the question bank. Please refresh or contact your instructor.</p>
                </div>`;
        }
    };
  </script>
