<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Science Final Exam</title>
    
    <!-- Fonts and Styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dacStyleSheets.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: var(--site-secondary); }
        :root { --primary-color: #2c3e50; --secondary-color: #ecf0f1; --site-secondary: #f8f9fa; }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>
    
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-12 col-lg-10 mx-auto">
                <div id="exam-container">
                    <div class="text-center p-5">
                        <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
                        <h3 class="mt-4 text-primary">Loading Final Exam...</h3>
                        <p class="text-muted">Preparing 100 questions from all units</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="footer-placeholder"></div>
    
    <!-- Load Exam Logic -->
    <script src="/js/examLogicCS.js"></script>
    <script src="/js/auth-guard.js"></script>
    
    <script>
    /**
     * FINAL EXAM CONFIGURATION
     * 
     * 100 questions distributed:
     * - 9 units (0-8) with questions distributed equally
     * - Within each unit, questions split equally among chapters
     * 
     * Unit structure from cs-course-map.json:
     * Unit 0: 1 chapter
     * Unit 1: 3 chapters (Ch 1-3)
     * Unit 2: 2 chapters (Ch 4-5)
     * Unit 3: 3 chapters (Ch 6-8)
     * Unit 4: 3 chapters (Ch 9-11)
     * Unit 5: 2 chapters (Ch 12-13)
     * Unit 6: 2 chapters (Ch 14-15)
     * Unit 7: 2 chapters (Ch 16-17)
     * Unit 8: 1 chapter (Ch 18)
     * 
     * Total: 19 chapters, 100 questions
     */
    
    // Final exam configuration - fetches from all units with weighted distribution
    const finalExamConfig = {
        // Use weighted mix to pull from all units 0-8
        useWeightedMix: true,
        targetUnit: 8,  // Will pull from units 0-8 with weighted distribution
        totalQuestions: 100,
        questionCount: 100,
        perChapter: true,  // Distribute equally among chapters within each unit
        chapterTitle: "Computer Science Final Exam",
        // Alternative: fetch by individual chapters for precise control
        fetchAllChapters: true
    };
    
/**
     * FINAL EXAM PREREQUISITE CHECK
     * Students must complete all 8 unit exams (Unit 1-8) before taking the final exam
     */
    async function checkFinalExamPrerequisites(studentId) {
        const requiredUnits = [1, 2, 3, 4, 5, 6, 7, 8];
        const completedUnits = [];
        const missingUnits = [];
        
        try {
            // Fetch all student grades
            const gradesRes = await fetch(`/api/student/grades?student_id=${encodeURIComponent(studentId)}`);
            if (!gradesRes.ok) throw new Error('Failed to fetch grades');
            
            const gradesData = await gradesRes.json();
            const studentGrades = gradesData.responses || [];
            
            // Check each required unit exam
            for (const unitNum of requiredUnits) {
                const examKey = `Unit${unitNum}-Exam`;
                const hasExam = studentGrades.some(g => g.exam_id === examKey && g.score !== null && g.score > 0);
                
                if (hasExam) {
                    completedUnits.push(unitNum);
                } else {
                    missingUnits.push(unitNum);
                }
            }
            
            return { completedUnits, missingUnits, allComplete: missingUnits.length === 0 };
            
        } catch (error) {
            console.error('[Final Exam Prereq] Error:', error);
            return { completedUnits: [], missingUnits: requiredUnits, allComplete: false, error: error.message };
        }
    }
    
    /**
     * Show locked screen when prerequisites not met
     */
    function showLockedScreen(missingUnits, completedUnits) {
        const container = document.getElementById('exam-container');
        if (!container) return;
        
        // Build status list HTML
        const allUnits = [1, 2, 3, 4, 5, 6, 7, 8];
        const statusHtml = allUnits.map(u => {
            const isDone = completedUnits.includes(u);
            return `
                <div class="d-flex align-items-center mb-2">
                    <span class="badge ${isDone ? 'bg-success' : 'bg-secondary'} me-2" style="width: 24px;">
                        ${isDone ? '<i class="fas fa-check"></i>' : u}
                    </span>
                    <span class="${isDone ? 'text-success fw-bold' : 'text-muted'}">Unit ${u} Exam</span>
                    ${isDone ? '<i class="fas fa-check-circle text-success ms-2"></i>' : ''}
                </div>
            `;
        }).join('');
        
        container.innerHTML = `
            <div class="card shadow border-danger mx-auto" style="max-width: 600px;">
                <div class="card-header bg-danger text-white text-center py-4">
                    <i class="fas fa-lock fa-3x mb-3"></i>
                    <h3 class="fw-bold mb-0">Final Exam Locked</h3>
                </div>
                <div class="card-body p-4 text-center">
                    <div class="alert alert-warning mb-4">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>Prerequisites Required</strong>
                    </div>
                    
                    <p class="text-dark mb-4">
                        You must complete all <strong>8 unit exams</strong> before taking the Final Exam.
                        <br><span class="text-muted small">Use "Keep Highest" - your best score from each unit is saved.</span>
                    </p>
                    
                    <div class="bg-light p-3 rounded border mb-4 text-start">
                        <h6 class="fw-bold text-primary mb-3">Unit Exam Status:</h6>
                        ${statusHtml}
                    </div>
                    
                    <div class="alert alert-info mb-4">
                        <strong>Missing:</strong> Unit ${missingUnits.join(', ')}
                    </div>
                    
                    <div class="d-grid gap-2">
                        <a href="/cs-interactive.html" class="btn btn-primary btn-lg fw-bold">
                            <i class="fas fa-book me-2"></i> Go to Unit Lessons
                        </a>
                        <p class="text-muted small mb-0">
                            Complete all unit exams (Unit 1-8) to unlock the Final Exam.
                        </p>
                    </div>
                </div>
            </div>
        `;
    }
    
    // Override the initExam to use final exam specific logic
    document.addEventListener('DOMContentLoaded', async function() {
        console.log('[Final Exam] Checking prerequisites first...');
        
        // Wait for auth to complete
        const authData = await waitForAuth();
        if (!authData.isAuthenticated) {
            window.location.replace(`/login.html?redirect=${encodeURIComponent(window.location.pathname)}`);
            return;
        }
        
        // Get student data
        let storedUser = {};
        try { storedUser = JSON.parse(localStorage.getItem('user') || '{}'); } catch(e) {}
        const studentId = storedUser.student_id || authData.user?.student_id;
        
        if (!studentId) {
            window.location.replace(`/login.html?redirect=${encodeURIComponent(window.location.pathname)}`);
            return;
        }
        
        // Show loading while checking prerequisites
        const container = document.getElementById('exam-container');
        container.innerHTML = `
            <div class="text-center p-5">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;"></div>
                <h3 class="mt-4 text-primary">Verifying Prerequisites...</h3>
                <p class="text-muted">Checking unit exam completion status</p>
            </div>`;
        
        // Check prerequisites
        const prereqResult = await checkFinalExamPrerequisites(studentId);
        
        if (!prereqResult.allComplete) {
            // Prerequisites NOT met - show locked screen
            console.log('[Final Exam] Prerequisites NOT met. Missing units:', prereqResult.missingUnits);
            showLockedScreen(prereqResult.missingUnits, prereqResult.completedUnits);
            return;
        }
        
        // All prerequisites met - proceed with final exam
        console.log('[Final Exam] All prerequisites met! Loading final exam...');
        
        try {
            // Fetch questions from all units (0-8) with equal distribution
            const allQuestionsByUnit = await fetchAllUnitsQuestions();
            
            // Distribute 100 questions across 9 units
            const distributedQuestions = distributeQuestionsAcrossUnits(allQuestionsByUnit, 100);
            
            // Initialize exam with distributed questions
            window.initExam({
                questions: distributedQuestions,
                questionCount: distributedQuestions.length,
                chapterTitle: "Computer Science Final Exam",
                perChapter: false  // Already distributed
            });
            
        } catch (error) {
            console.error('[Final Exam] Error initializing:', error);
            document.getElementById('exam-container').innerHTML = `
                <div class="alert alert-danger text-center">
                    <h4>Error Loading Final Exam</h4>
                    <p>Please contact your instructor.</p>
                    <p class="small text-muted">${error.message}</p>
                </div>`;
        }
    });
    
    /**
     * Fetch questions from all units (0-8)
     */
    async function fetchAllUnitsQuestions() {
        const allQuestions = {};
        const units = [0, 1, 2, 3, 4, 5, 6, 7, 8];
        
        for (const unit of units) {
            try {
                const questions = await window.fetchExamQuestionsFromAPI(unit);
                allQuestions[unit] = questions || [];
                console.log(`[Final Exam] Unit ${unit}: ${questions.length} questions loaded`);
            } catch (e) {
                console.warn(`[Final Exam] Warning: Could not load unit ${unit}:`, e.message);
                allQuestions[unit] = [];
            }
        }
        
        return allQuestions;
    }
    
    /**
     * Distribute 100 questions across units with equal distribution per chapter
     * 
     * Course structure:
     * Unit 0: 1 chapter (Ch 0)     = 1 chapter
     * Unit 1: 3 chapters (Ch 1-3)   = 3 chapters
     * Unit 2: 2 chapters (Ch 4-5)   = 2 chapters  
     * Unit 3: 3 chapters (Ch 6-8)   = 3 chapters
     * Unit 4: 3 chapters (Ch 9-11)   = 3 chapters
     * Unit 5: 2 chapters (Ch 12-13)  = 2 chapters
     * Unit 6: 2 chapters (Ch 14-15) = 2 chapters
     * Unit 7: 2 chapters (Ch 16-17) = 2 chapters
     * Unit 8: 1 chapter (Ch 18)     = 1 chapter
     * -------------------------------------------
     * Total: 9 units, 19 chapters
     */
    function distributeQuestionsAcrossUnits(allQuestionsByUnit, totalNeeded = 100) {
// Exactly 100 questions distributed equally
        // Unit 0: 12 questions (1 chapter)
        // Units 1-7: 11 questions each (77 total)
        // Unit 8: 11 questions (1 chapter)
        // Total: 100
        const courseMap = {
            0: { chapters: [0], questionsPerUnit: 12 },
            1: { chapters: [1, 2, 3], questionsPerUnit: 11 },   // 3-4-4 = 11
            2: { chapters: [4, 5], questionsPerUnit: 11 },    // 5-6 = 11
            3: { chapters: [6, 7, 8], questionsPerUnit: 11 },   // 4-4-3 = 11
            4: { chapters: [9, 10, 11], questionsPerUnit: 11 }, // 4-4-3 = 11
            5: { chapters: [12, 13], questionsPerUnit: 11 },    // 5-6 = 11
            6: { chapters: [14, 15], questionsPerUnit: 11 },   // 5-6 = 11
            7: { chapters: [16, 17], questionsPerUnit: 11 },   // 5-6 = 11
            8: { chapters: [18], questionsPerUnit: 11 }
        };
        
        const allQuestions = [];
        
// Process each unit - divide questions equally among chapters in that unit
        for (const [unitStr, unitData] of Object.entries(courseMap)) {
            const unit = parseInt(unitStr);
            const questionsPool = allQuestionsByUnit[unit] || [];
            
            if (questionsPool.length === 0) {
                console.warn(`[Final Exam] No questions available for Unit ${unit}`);
                continue;
            }
            
            // Group by chapter
            const byChapter = {};
            questionsPool.forEach(q => {
                const ch = q.chapter !== undefined ? q.chapter : unit;
                if (!byChapter[ch]) byChapter[ch] = [];
                byChapter[ch].push(q);
            });
            
            // Divide questionsPerUnit equally among chapters in this unit
            const numChapters = unitData.chapters.length;
            const questionsPerUnit = unitData.questionsPerUnit;
            
            // Distribute: first chapters get extra if not evenly divisible
            const baseCount = Math.floor(questionsPerUnit / numChapters);
            const extra = questionsPerUnit % numChapters;
            
            let chapterIndex = 0;
            unitData.chapters.forEach(ch => {
                const chapterQuestions = byChapter[ch] || [];
                // Distribute extra questions to first chapters
                const needed = baseCount + (chapterIndex < extra ? 1 : 0);
                chapterIndex++;
                
                // Shuffle and take needed amount
                const shuffled = shuffleArray([...chapterQuestions]);
                const selected = shuffled.slice(0, needed);
                allQuestions.push(...selected);
                
                console.log(`[Final Exam] Unit ${unit}, Chapter ${ch}: ${selected.length} questions`);
            });
        }
        
        // Shuffle all questions and limit to total needed
        const finalQuestions = shuffleArray(allQuestions).slice(0, totalNeeded);
        
        console.log(`[Final Exam] Total distributed: ${finalQuestions.length} questions`);
        return finalQuestions;
    }
    
    /**
     * Fisher-Yates shuffle
     */
    function shuffleArray(array) {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }
    </script>
</body>
</html>
